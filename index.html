<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBR Invoice System | Fair Tax</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/localforage/dist/localforage.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; background-color: #fbfbfd; }
        
        @media print { body * { visibility: hidden; } #printable-area, #printable-area * { visibility: visible; } #printable-area { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; box-shadow: none !important; border-radius: 0 !important; overflow: visible !important; } .no-print { display: none !important; } }
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; } ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        
        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; } 
        .fbr-table { width: max-content; min-width: 100%; background: white; border-collapse: separate; border-spacing: 0; } 
        .fbr-table th, .fbr-table td { white-space: nowrap !important; padding: 12px 16px; vertical-align: middle; border-bottom: 1px solid #f3f4f6; } 
        .fbr-table .desc-col { min-width: 250px; } .fbr-table .hs-col { min-width: 180px; }
        
        .standard-input { height: 2.75rem; width: 100%; border: 1px solid #e5e7eb; border-radius: 12px; padding: 0 1rem; font-size: 0.875rem; outline: none; background: #ffffff; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 1px 2px rgba(0,0,0,0.02); } 
        .standard-input:focus { border-color: #000000; box-shadow: 0 0 0 4px rgba(0,0,0,0.05); } 
        .standard-input:read-only { background: #f9fafb; color: #9ca3af; cursor: not-allowed; border-color: transparent; box-shadow: none; }

        @keyframes smoothFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: smoothFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>

<body class="text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Component } = React;

        const SYSTEM_CONFIG = { BASE_URL: "https://gw.fbr.gov.pk", PATHS: { POST_INVOICE_SB: "/di_data/v1/di/postinvoicedata_sb", POST_INVOICE_PROD: "/di_data/v1/di/postinvoicedata", VALIDATE_INVOICE_SB: "/di_data/v1/di/validateinvoicedata_sb", VALIDATE_INVOICE_PROD: "/di_data/v1/di/validateinvoicedata", PROVINCES: "/pdi/v1/provinces", DOCTYPECODE: "/pdi/v1/doctypecode", SROITEMCODE: "/pdi/v1/sroitemcode", TRANSTYPECODE: "/pdi/v1/transtypecode", UOM: "/pdi/v1/uom", HS_UOM: "/pdi/v2/HS_UOM", ITEM_CODE: "/pdi/v1/itemdesccode", GET_REG_TYPE: "/dist/v1/Get_Reg_Type" } };
        const SALE_TYPES = [ "Goods at standard rate (default)", "Goods at reduced rate", "Goods at zero-rate", "Petroleum Products", "Electricity Supply to Retailers", "SIM", "Gas to CNG stations", "Mobile Phones", "Processing/Conversion of Goods", "3rd Schedule Goods", "Goods (FED in ST Mode)", "Services (FED in ST Mode)", "Services", "Exempt goods", "DTRE goods", "Cotton ginners", "Electric Vehicle", "Cement /Concrete Block", "Telecommunication services", "Steel melting and re-rolling", "Ship breaking", "Potassium Chlorate", "CNG Sales", "Goods as per SRO.297(I)/2023", "Toll Manufacturing", "Non-Adjustable Supplies" ];
        const DOCUMENT_TYPES = [ "Sale Invoice", "Debit Note" ];
        const UOM_OPTIONS = [ "Numbers, pieces, units", "MT", "Bill of lading", "SET", "KWH", "40KG", "Liter", "SqY", "Bag", "KG", "MMBTU", "Meter", "Carat", "Cubic Metre", "Dozen", "Gram", "Gallon", "Kilogram", "Pound", "Timber logs", "Packs", "Pair", "Square Foot", "Square Metre", "Thousand Unit", "Mega Watt", "Foot", "Barrels", "NO", "Others", "1000kWh" ];
        const PROVINCES = [ "Azad Jammu and Kashmir", "Balochistan", "Capital Territory", "FATA/PATA", "Gilgit Baltistan", "Khyber Pakhtunkhwa", "Punjab", "Sindh" ];
        
        const FBR_ERRORS = { "0000": "Successful", "0001": "Invalid NTN/Reg. No. format", "0004": "Seller Reg No. doesn't match", "0005": "Buyer Name is empty/invalid", "0007": "Sale Type not allowed/invalid", "0009": "Provide UOM in KG", "0010": "Quantity/Electricity Units missing", "0011": "Provide Value of Sales Excl. ST", "0039": "STWH invoice fields must be same as sale invoice", "0041": "Invoice number cannot be empty", "0042": "Invoice date cannot be empty", "0044": "HS Code cannot be empty", "0053": "Buyer Registration Type is invalid", "0070": "User is not registered, STWH is allowed only for registered user", "0073": "Provide Sale Origination Province of Supplier", "0074": "Provide Destination of Supply", "0077": "SRO/Schedule Number cannot be empty", "0078": "Item serial number cannot be empty", "0082": "The Seller is not registered for sales tax", "0106": "The Buyer is not registered for sales tax", "0401": "Unauthorized access: Seller NTN/CNIC token is invalid", "0402": "Unauthorized access: Buyer NTN/CNIC token is invalid" };

        const numberToWords = (num) => {
            if (num === 0) return "Zero";
            const a = ["", "One ", "Two ", "Three ", "Four ", "Five ", "Six ", "Seven ", "Eight ", "Nine ", "Ten ", "Eleven ", "Twelve ", "Thirteen ", "Fourteen ", "Fifteen ", "Sixteen ", "Seventeen ", "Eighteen ", "Nineteen "];
            const b = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];
            const format = (n) => {
                if (n < 20) return a[n];
                if (n < 100) return b[Math.floor(n / 10)] + (n % 10 !== 0 ? " " + a[n % 10] : "");
                return a[Math.floor(n / 100)] + "Hundred " + (n % 100 !== 0 ? format(n % 100) : "");
            };
            let res = "";
            let crore = Math.floor(num / 10000000); num %= 10000000;
            let lakh = Math.floor(num / 100000); num %= 100000;
            let thousand = Math.floor(num / 1000); num %= 1000;
            if (crore > 0) res += format(crore) + "Crore ";
            if (lakh > 0) res += format(lakh) + "Lakh ";
            if (thousand > 0) res += format(thousand) + "Thousand ";
            if (num > 0) res += format(num);
            return res.trim() + " Rupees Only";
        };

        class ErrorBoundary extends Component { constructor(props) { super(props); this.state = { hasError: false, error: null }; } static getDerivedStateFromError(error) { return { hasError: true, error }; } render() { if (this.state.hasError) return (<div className="min-h-screen flex items-center justify-center"><div className="bg-white p-8 rounded-lg shadow-xl"><h1 className="text-xl font-bold mb-2">Error Occurred</h1><button onClick={() => { localStorage.clear(); sessionStorage.clear(); window.location.reload(); }} className="bg-black text-white px-4 py-2 rounded">Reset App Data</button></div></div>); return this.props.children; } }

        const IconBase = ({ size = 20, children, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>{children}</svg> );
        const Icons = {
            FileText: (props) => <IconBase {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /></IconBase>, Settings: (props) => <IconBase {...props}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></IconBase>, Plus: (props) => <IconBase {...props}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></IconBase>, Trash2: (props) => <IconBase {...props}><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></IconBase>, Save: (props) => <IconBase {...props}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></IconBase>, Printer: (props) => <IconBase {...props}><polyline points="6 9 6 0 18 0 18 9" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><rect x="6" y="14" width="12" height="8" /></IconBase>, CheckCircle: (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></IconBase>, AlertCircle: (props) => <IconBase {...props}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></IconBase>, X: (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></IconBase>, ShieldCheck: (props) => <IconBase {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><path d="m9 12 2 2 4-4" /></IconBase>, ShoppingCart: (props) => <IconBase {...props}><circle cx="9" cy="21" r="1" /><circle cx="20" cy="21" r="1" /><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" /></IconBase>, User: (props) => <IconBase {...props}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></IconBase>, LogOut: (props) => <IconBase {...props}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></IconBase>, Box: (props) => <IconBase {...props}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></IconBase>, Users: (props) => <IconBase {...props}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></IconBase>, Search: (props) => <IconBase {...props}><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></IconBase>, Calendar: (props) => <IconBase {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></IconBase>, Edit: (props) => <IconBase {...props}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></IconBase>, Download: (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></IconBase>, Eye: (props) => <IconBase {...props}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></IconBase>, Briefcase: (props) => <IconBase {...props}><rect x="2" y="7" width="20" height="14" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></IconBase>, ChevronRight: (props) => <IconBase {...props}><polyline points="9 18 15 12 9 6" /></IconBase>
        };

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, title }) => {
            const variants = { 
                primary: "bg-black text-white hover:bg-gray-800 hover:shadow-lg disabled:bg-gray-300 disabled:text-gray-500", 
                secondary: "bg-white text-gray-900 border border-gray-200 hover:bg-gray-50 hover:border-gray-300 shadow-sm", 
                danger: "bg-red-50 text-red-600 hover:bg-red-100", 
                ghost: "bg-transparent text-gray-600 hover:bg-gray-100 hover:text-gray-900 border-none" 
            };
            return (
                <button title={title} onClick={onClick} disabled={disabled} 
                    className={`px-5 py-2.5 rounded-xl font-medium text-sm transition-all duration-200 ease-out flex items-center justify-center gap-2 active:scale-95 ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const Card = ({ children, className = '', onClick }) => <div onClick={onClick} className={`bg-white rounded-2xl shadow-sm border border-gray-100/80 transition-all duration-300 ${onClick ? 'cursor-pointer hover:shadow-md hover:border-gray-300 hover:-translate-y-0.5' : ''} ${className}`}>{children}</div>;

        const Input = ({ label, value, onChange, type = "text", placeholder = "", required = false, className = "", readOnly = false, disabled = false }) => (
            <div className={`flex flex-col gap-1.5 ${className}`}>
                {label && <label className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider pl-1">{label} {required && <span className="text-red-500">*</span>}</label>}
                <input type={type} value={value} onChange={onChange} disabled={disabled} placeholder={placeholder} readOnly={readOnly} className={`standard-input ${readOnly || disabled ? 'opacity-70' : ''}`} />
            </div>
        );

        const SearchableDropdown = ({ label, value, onChange = () => {}, options = [], placeholder, strict = true, status = null, readOnly = false }) => {
            const [show, setShow] = useState(false);
            const [filter, setFilter] = useState("");
            const wrapperRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (e) => { if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setShow(false); };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const safeOptions = Array.isArray(options) ? options : [];
            const filteredOptions = safeOptions.filter(opt => String(opt).toLowerCase().includes(filter.toLowerCase()));

            return (
                <div className="flex flex-col gap-1.5 relative w-full" ref={wrapperRef}>
                    <div className="flex justify-between items-center">
                        {label && <label className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider pl-1">{label}</label>}
                        {status && <span className={`text-[10px] px-1 rounded ${status.type === 'error' ? 'text-red-600 bg-red-50' : 'text-gray-600 bg-gray-100'}`}>{status.text}</span>}
                    </div>
                    <div className="relative">
                        <input type="text" value={value || ""} readOnly={strict || readOnly} className={`standard-input ${strict || readOnly ? 'cursor-pointer' : ''}`} placeholder={placeholder} onClick={() => { if (!readOnly) { setShow(!show); setFilter(""); } }} onChange={!strict && !readOnly ? (e) => onChange(e.target.value) : undefined} />
                        {strict && !readOnly && <div className="absolute right-3 top-3 text-gray-400 pointer-events-none"><Icons.Settings size={14} /></div>}
                    </div>
                    {show && !readOnly && (
                        <div className="absolute top-full left-0 right-0 mt-2 bg-white border border-gray-100 rounded-xl shadow-xl z-50 overflow-hidden animate-fade-in">
                            <div className="p-2 border-b border-gray-50"><input autoFocus type="text" className="w-full text-sm p-2 outline-none bg-gray-50 rounded-lg" placeholder="Search..." value={filter} onChange={e => setFilter(e.target.value)} /></div>
                            <div className="max-h-48 overflow-y-auto">
                                {filteredOptions.length > 0 ? filteredOptions.slice(0, 50).map((opt, i) => (
                                    <div key={i} className="px-4 py-2.5 hover:bg-gray-50 cursor-pointer text-sm text-gray-700 transition-colors" onClick={() => { onChange(opt); setShow(false); }}>{opt}</div>
                                )) : <div className="p-4 text-sm text-center text-gray-400">No options found</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const formatCurrency = (val) => parseFloat(val || 0).toLocaleString('en-PK', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const getToday = () => new Date().toISOString().split('T')[0];

        const fbrFetch = async (url, options = {}) => {
            if (!url.startsWith(SYSTEM_CONFIG.BASE_URL)) return fetch(url, options);
            const proxyPayload = { endpoint: url.replace(SYSTEM_CONFIG.BASE_URL, ''), method: options.method || 'GET', headers: options.headers || {} };
            if (options.body) { try { proxyPayload.payload = JSON.parse(options.body); } catch { proxyPayload.payload = options.body; } }
            const sessionToken = sessionStorage.getItem('fbr_token');
            if (!sessionToken) return { ok: false, status: 401, json: async () => ({ error: "Missing token" }) };
            const res = await fetch('https://app.tallied.pk/api/fbr/proxy', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` }, body: JSON.stringify(proxyPayload) });
            if (!res.ok) return res;
            const proxyData = await res.json();
            return { ok: proxyData.ok, status: proxyData.status, json: async () => proxyData.data };
        };

        const BusinessList = ({ user, onSelect, onLogout, isLobby = false }) => {
            const [searchQuery, setSearchQuery] = useState("");
            const filteredBiz = user.accessibleBusinesses.filter(b => b.name.toLowerCase().includes(searchQuery.toLowerCase()));

            return (
                <div className={`flex flex-col animate-fade-in ${isLobby ? 'min-h-screen bg-gray-50' : 'w-full mt-4'}`}>
                    {isLobby && (
                        <nav className="bg-black text-white shadow-lg sticky top-0 z-50">
                            <div className="max-w-[1600px] mx-auto px-4 py-4 flex justify-between items-center">
                                <div className="flex items-center gap-3 font-bold tracking-wide"><Icons.ShieldCheck /> FBR Digital Invoicing</div>
                                <Button onClick={onLogout} variant="ghost" className="text-sm text-gray-300 hover:text-white hover:bg-white/10">
                                    <Icons.LogOut size={16}/> {user.isAdminImpersonating ? 'Return to Admin' : 'Logout'}
                                </Button>
                            </div>
                        </nav>
                    )}
                    <main className={`max-w-[1200px] mx-auto w-full ${isLobby ? 'p-8 mt-8' : ''}`}>
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-gray-200 pb-6">
                            <div>
                                <h2 className="text-3xl font-bold text-gray-900 tracking-tight">Select a Business</h2>
                                <p className="text-gray-500 mt-2 text-sm">Search and select the account you want to manage today.</p>
                            </div>
                            <div className="relative w-full md:w-72">
                                <input type="text" placeholder="Search businesses..." className="px-4 py-2.5 border border-gray-200 rounded-xl outline-none w-full pl-10 text-sm shadow-sm focus:border-black focus:ring-2 focus:ring-gray-100 transition-all" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                <span className="absolute left-3 top-3 text-gray-400"><Icons.Search size={16} /></span>
                            </div>
                        </div>
                        <div className="flex flex-col gap-3">
                            {filteredBiz.length > 0 ? filteredBiz.map(b => (
                                <Card key={b.id} 
                                    className={`p-5 flex flex-col md:flex-row justify-between items-center gap-4 transition-all cursor-pointer group 
                                    ${b.id === user.activeBusinessId && !isLobby ? 'border-black ring-1 ring-black shadow-md' : 'hover:border-gray-300'}`} 
                                    onClick={() => { if(b.id !== user.activeBusinessId || isLobby) onSelect(b.id); }}>
                                    
                                    <div className="flex-1 flex items-center gap-5">
                                        <div className={`p-3 rounded-xl transition-colors ${b.id === user.activeBusinessId && !isLobby ? 'bg-black text-white' : 'bg-gray-100 text-gray-500 group-hover:bg-gray-200 group-hover:text-black'}`}>
                                            <Icons.Briefcase size={24}/>
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-lg text-gray-900 flex items-center gap-2">
                                                {b.name} 
                                                {b.id === user.activeBusinessId && !isLobby && <span className="text-[10px] bg-black text-white px-2 py-0.5 rounded-full uppercase tracking-widest font-semibold">Active</span>}
                                            </h3>
                                            <p className="text-xs text-gray-500 uppercase tracking-wider mt-1">Role: <span className="font-semibold text-black">{b.accessLevel}</span></p>
                                        </div>
                                    </div>
                                    
                                    {(!isLobby && b.id === user.activeBusinessId) ? null : (
                                        <div className="flex items-center text-gray-300 group-hover:text-black transition-colors pr-2 transform group-hover:translate-x-1">
                                            <Icons.ChevronRight size={24} />
                                        </div>
                                    )}
                                </Card>
                            )) : <div className="text-center py-12 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-200">No businesses match your search.</div>}
                        </div>
                    </main>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isAppLoading, setIsAppLoading] = useState(true);

            useEffect(() => {
                const loadSession = async () => {
                    try {
                        let session = null;
                        if (window.localforage) session = await window.localforage.getItem('fbr_session');
                        if (!session) {
                            const oldSession = sessionStorage.getItem('fbr_session');
                            if (oldSession) session = JSON.parse(oldSession);
                        }
                        if (session) setUser(session);
                    } catch (e) {
                        sessionStorage.clear();
                        if (window.localforage) await window.localforage.clear();
                        setUser(null);
                    } finally { setIsAppLoading(false); }
                };
                loadSession();
            }, []);

            const handleLogin = async (u) => {
                setUser(u);
                try {
                    sessionStorage.setItem('fbr_session', JSON.stringify(u)); 
                    if (window.localforage) await window.localforage.setItem('fbr_session', u);
                } catch(e) {}
            };

            const handleLogout = async (e, force = false) => {
                if (e && e.preventDefault) e.preventDefault();
                if (user && user.isAdminImpersonating && !force) return handleExitImpersonation();
                sessionStorage.clear(); localStorage.clear();
                if (window.localforage) await window.localforage.clear().catch(()=>{});
                window.location.href = window.location.pathname + '?logout=' + Date.now();
            };

            const handleBusinessSwitch = async (businessId) => {
                try {
                    const res = await fetch('https://app.tallied.pk/api/switch-business', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionStorage.getItem('fbr_token')}` },
                        body: JSON.stringify({ businessId })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        sessionStorage.setItem('fbr_token', data.token);
                        window.location.hash = 'invoice';
                        await handleLogin(data.user);
                        window.location.reload();
                    } else { alert("Failed to switch business context."); }
                } catch (e) { alert("Network Error"); }
            };

            const handleImpersonate = async (userId) => {
                try {
                    const response = await fetch('https://app.tallied.pk/api/admin/impersonate', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionStorage.getItem('fbr_token')}` },
                        body: JSON.stringify({ userId })
                    });
                    const data = await response.json();
                    if (response.ok && data.token) {
                        sessionStorage.setItem('fbr_admin_backup', JSON.stringify(user));
                        sessionStorage.setItem('fbr_admin_token', sessionStorage.getItem('fbr_token'));
                        if (window.localforage) await window.localforage.setItem('fbr_admin_backup', user);
                        const clientUser = { ...data.user, isAdminImpersonating: true };
                        sessionStorage.setItem('fbr_token', data.token);
                        sessionStorage.setItem('fbr_session', JSON.stringify(clientUser));
                        if (window.localforage) await window.localforage.setItem('fbr_session', clientUser);
                        window.location.reload();
                    } else { alert(data.error || "Failed to impersonate"); }
                } catch (err) { alert("Network error connecting to User."); }
            };

            const handleExitImpersonation = async () => {
                try {
                    const fallbackBackup = sessionStorage.getItem('fbr_admin_backup');
                    const fallbackToken = sessionStorage.getItem('fbr_admin_token');
                    sessionStorage.removeItem('fbr_admin_backup'); sessionStorage.removeItem('fbr_admin_token');
                    if (window.localforage) await window.localforage.removeItem('fbr_admin_backup').catch(()=>{});
                    if (fallbackBackup && fallbackToken) {
                        const adminUser = JSON.parse(fallbackBackup);
                        sessionStorage.setItem('fbr_token', fallbackToken);
                        sessionStorage.setItem('fbr_session', fallbackBackup);
                        if (window.localforage) await window.localforage.setItem('fbr_session', adminUser).catch(()=>{});
                        window.location.hash = ''; 
                        window.location.reload();
                    } else { handleLogout(null, true); }
                } catch (err) { window.location.href = window.location.pathname + '?logout=' + Date.now(); }
            };

            if (isAppLoading) return <div className="min-h-screen flex items-center justify-center bg-gray-50 text-gray-500">Loading System...</div>;
            if (!user) return <LoginScreen onLogin={handleLogin} />;
            
            if (user.needsBusinessSelection) {
                return <BusinessList user={user} onSelect={handleBusinessSwitch} onLogout={handleLogout} isLobby={true} />;
            }

            if (user.role !== 'admin' && (!user.settings || !user.businessStatus)) return <LoginScreen onLogin={handleLogin} />;

            return (
                <ErrorBoundary>
                    {user.role === 'admin' ? <AdminDashboard onLogout={handleLogout} onImpersonate={handleImpersonate} /> : <ClientDashboard user={user} setUser={handleLogin} onLogout={handleLogout} onSwitch={handleBusinessSwitch} />}
                </ErrorBoundary>
            );
        }

        const LoginScreen = ({ onLogin }) => {
            const [form, setForm] = useState({ username: '', password: '' });
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async () => {
                if (!form.username || !form.password) return setError("Fill all fields");
                setLoading(true);
                try {
                    const res = await fetch('https://app.tallied.pk/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) });
                    const data = await res.json();
                    if (res.ok) { sessionStorage.setItem('fbr_token', data.token); onLogin(data.user); } 
                    else setError(data.error || "Invalid credentials");
                } catch (e) { setError("Network Error"); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-50 animate-fade-in">
                    <div className="bg-white p-10 rounded-2xl border border-gray-100 shadow-xl w-full max-w-md">
                        <div className="text-center mb-8">
                            <div className="bg-black text-white w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-md"><Icons.ShieldCheck size={24} /></div>
                            <h1 className="text-2xl font-bold text-gray-900 tracking-tight">Welcome Back</h1>
                            <p className="text-sm text-gray-500 mt-1">Sign in to the FBR Portal</p>
                        </div>
                        {error && <div className="bg-red-50 text-red-600 p-4 rounded-xl mb-6 text-sm text-center border border-red-100 font-medium">{error}</div>}
                        <div className="space-y-5">
                            <Input label="Username" value={form.username} onChange={e => setForm({ ...form, username: e.target.value })} />
                            <Input label="Password" type="password" value={form.password} onChange={e => setForm({ ...form, password: e.target.value })} />
                            <Button onClick={handleSubmit} disabled={loading} className="w-full py-3.5 mt-2 text-base shadow-md">{loading ? 'Authenticating...' : 'Sign In'}</Button>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminDashboard = ({ onLogout, onImpersonate }) => {
            const [businesses, setBusinesses] = useState([]);
            const [users, setUsers] = useState([]);
            
            const [activeTab, setActiveTab] = useState(() => window.location.hash.replace('#', '') || 'businesses');
            useEffect(() => { const handleHash = () => { const hash = window.location.hash.replace('#', ''); if(['businesses', 'users'].includes(hash)) setActiveTab(hash); }; window.addEventListener('hashchange', handleHash); return () => window.removeEventListener('hashchange', handleHash); }, []);
            const changeTab = (t) => { window.location.hash = t; };

            const [showBizModal, setShowBizModal] = useState(false);
            const [editingBiz, setEditingBiz] = useState(null); 
            const [editingUser, setEditingUser] = useState(null);
            
            const [adminError, setAdminError] = useState("");
            const [bizSearch, setBizSearch] = useState("");
            const [userSearch, setUserSearch] = useState("");
            
            const [bizToAdd, setBizToAdd] = useState("");
            const [roleToAdd, setRoleToAdd] = useState("view");

            const fetchData = async () => {
                const token = sessionStorage.getItem('fbr_token');
                const [bRes, uRes] = await Promise.all([
                    fetch('https://app.tallied.pk/api/admin/businesses', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('https://app.tallied.pk/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                if (bRes.ok) setBusinesses(await bRes.json());
                if (uRes.ok) setUsers(await uRes.json());
            };

            useEffect(() => { fetchData(); }, [activeTab]);

            const saveBusiness = async () => {
                setAdminError(""); if (!editingBiz.businessName) return setAdminError("Business Name is required");
                const url = editingBiz.id ? `https://app.tallied.pk/api/admin/businesses/${editingBiz.id}` : 'https://app.tallied.pk/api/admin/businesses';
                const method = editingBiz.id ? 'PUT' : 'POST';
                try {
                    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionStorage.getItem('fbr_token')}` }, body: JSON.stringify(editingBiz) });
                    if (res.ok) { setShowBizModal(false); setEditingBiz(null); fetchData(); } else setAdminError((await res.json()).error || "Error saving business");
                } catch (e) { setAdminError("Network Error"); }
            };

            const saveUser = async () => {
                setAdminError(""); if (!editingUser.username) return setAdminError("Username is required.");
                const isNew = !editingUser.id;
                if (isNew && (!editingUser.password || editingUser.password.length < 6)) return setAdminError("Password (min 6 chars) required for new users.");
                const url = isNew ? 'https://app.tallied.pk/api/admin/users' : `https://app.tallied.pk/api/admin/users/${editingUser.id}`;
                const method = isNew ? 'POST' : 'PUT';
                try {
                    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionStorage.getItem('fbr_token')}` }, body: JSON.stringify(editingUser) });
                    if (res.ok) { setEditingUser(null); fetchData(); if(!isNew) alert("User profile updated!"); } else setAdminError((await res.json()).error || "Error saving user");
                } catch (e) { setAdminError("Network Error"); }
            };

            const filteredBiz = businesses.filter(b => (b.businessName || "").toLowerCase().includes(bizSearch.toLowerCase()) || (b.ntn || "").includes(bizSearch));
            const filteredUsers = users.filter(u => (u.username || "").toLowerCase().includes(userSearch.toLowerCase()));

            return (
                <div className="min-h-screen bg-gray-50 animate-fade-in">
                    <nav className="bg-black text-white shadow-lg sticky top-0 z-40">
                        <div className="max-w-[1600px] mx-auto px-6 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3 font-bold tracking-wide"><Icons.ShieldCheck /> Super Admin Portal</div>
                            <div className="flex items-center gap-6">
                                <div className="flex bg-gray-800/50 p-1 rounded-xl">
                                    <button onClick={() => changeTab('businesses')} className={`px-5 py-1.5 text-sm rounded-lg transition-all duration-200 ${activeTab === 'businesses' ? 'bg-white text-black font-bold shadow-sm' : 'text-gray-300 hover:text-white'}`}>Businesses</button>
                                    <button onClick={() => changeTab('users')} className={`px-5 py-1.5 text-sm rounded-lg transition-all duration-200 ${activeTab === 'users' ? 'bg-white text-black font-bold shadow-sm' : 'text-gray-300 hover:text-white'}`}>Users</button>
                                </div>
                                <Button onClick={onLogout} variant="ghost" className="text-gray-300 hover:text-white hover:bg-white/10"><Icons.LogOut size={18}/></Button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-[1600px] mx-auto p-6 md:p-8">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                            <h2 className="text-3xl font-bold text-gray-900 tracking-tight">{activeTab === 'businesses' ? 'Registered Businesses' : 'User Accounts'}</h2>
                            <div className="flex items-center gap-4 w-full md:w-auto">
                                <div className="relative w-full md:w-72">
                                    <input type="text" placeholder={activeTab === 'businesses' ? "Search businesses..." : "Search users..."} className="px-4 py-2.5 border border-gray-200 rounded-xl outline-none w-full pl-10 text-sm shadow-sm focus:border-black focus:ring-2 focus:ring-gray-100 transition-all" value={activeTab === 'businesses' ? bizSearch : userSearch} onChange={e => activeTab === 'businesses' ? setBizSearch(e.target.value) : setUserSearch(e.target.value)} />
                                    <span className="absolute left-3 top-3 text-gray-400"><Icons.Search size={16} /></span>
                                </div>
                                {activeTab === 'businesses' ? <Button onClick={() => { setEditingBiz({ businessName: '', ntn: '', strn: '', address: '', province: 'Sindh', integrationMode: 'sandbox', sandboxToken: '', productionToken: '', taxRates: { salesTax: 18, furtherTax: 4, extraTax: 0 }, allowRetailFed: false }); setShowBizModal(true); }} variant="primary" className="shadow-md"><Icons.Plus /> Create</Button> : <Button onClick={() => { setEditingUser({ username: '', password: '', role: 'user', access: [] }); setAdminError(''); }} variant="primary" className="shadow-md"><Icons.Plus /> Create</Button>}
                            </div>
                        </div>

                        {showBizModal && editingBiz && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                                <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto">
                                    <div className="flex justify-between items-center mb-8 border-b border-gray-100 pb-4"><h3 className="text-2xl font-bold text-gray-900 tracking-tight">{editingBiz.id ? `Manage Business` : 'Create New Business'}</h3><button onClick={() => setShowBizModal(false)} className="text-gray-400 hover:text-black hover:bg-gray-100 p-2 rounded-full transition-colors"><Icons.X size={24} /></button></div>
                                    {adminError && <div className="mb-6 p-4 bg-red-50 text-red-600 font-medium text-sm rounded-xl border border-red-100">{adminError}</div>}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-5">
                                            <h4 className="font-bold text-gray-900 border-b border-gray-100 pb-2 flex items-center gap-2"><Icons.FileText size={18}/> Profile & Status</h4>
                                            {editingBiz.id && (
                                                <div className="bg-gray-50 p-5 rounded-xl border border-gray-200">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <div><div className="font-bold text-sm text-gray-900">Billing Status</div><div className={`text-xs mt-1 font-medium px-2 py-1 rounded inline-block ${editingBiz.isRevoked ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>{editingBiz.isRevoked ? 'Access Revoked' : 'Active Account'}</div></div>
                                                        <Button onClick={() => setEditingBiz({ ...editingBiz, isRevoked: !editingBiz.isRevoked })} variant={editingBiz.isRevoked ? "primary" : "danger"} className="text-xs">{editingBiz.isRevoked ? "Restore Access" : "Revoke Account"}</Button>
                                                    </div>
                                                    <div className="border-t border-gray-200 pt-4"><Input label="Subscription Expiry" type="date" value={(editingBiz.expiryDate || new Date().toISOString()).split('T')[0]} onChange={e => setEditingBiz({ ...editingBiz, expiryDate: new Date(e.target.value).toISOString() })} /><div className="flex gap-2 mt-3"><button onClick={() => { const d = new Date(); d.setDate(d.getDate() + 30); setEditingBiz({ ...editingBiz, expiryDate: d.toISOString() }) }} className="text-xs bg-white border border-gray-200 px-3 py-1.5 rounded-lg hover:border-black hover:shadow-sm transition-all">+30 Days</button><button onClick={() => { const d = new Date(); d.setDate(d.getDate() + 365); setEditingBiz({ ...editingBiz, expiryDate: d.toISOString() }) }} className="text-xs bg-white border border-gray-200 px-3 py-1.5 rounded-lg hover:border-black hover:shadow-sm transition-all">+1 Year</button></div></div>
                                                </div>
                                            )}
                                            <Input label="Business Name" value={editingBiz.businessName} onChange={e => setEditingBiz({ ...editingBiz, businessName: e.target.value })} required />
                                            <div className="grid grid-cols-2 gap-4"><Input label="NTN" value={editingBiz.ntn} onChange={e => setEditingBiz({ ...editingBiz, ntn: e.target.value })} /><Input label="STRN" value={editingBiz.strn} onChange={e => setEditingBiz({ ...editingBiz, strn: e.target.value })} /></div>
                                            <Input label="Address" value={editingBiz.address} onChange={e => setEditingBiz({ ...editingBiz, address: e.target.value })} />
                                            <SearchableDropdown label="Province" value={editingBiz.province} options={PROVINCES} onChange={val => setEditingBiz({ ...editingBiz, province: val })} />
                                        </div>
                                        <div className="space-y-5">
                                            <h4 className="font-bold text-gray-900 border-b border-gray-100 pb-2 flex items-center gap-2"><Icons.Settings size={18}/> FBR Configuration</h4>
                                            <div className="flex flex-col gap-1.5"><label className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider pl-1">Active Mode</label><select className="standard-input" value={editingBiz.integrationMode} onChange={e => setEditingBiz({ ...editingBiz, integrationMode: e.target.value })}><option value="sandbox">Sandbox (Testing)</option><option value="production">Production (Live)</option></select></div>
                                            <div className="bg-yellow-50/50 p-4 rounded-xl border border-yellow-100"><Input label="Sandbox Auth Token" type="password" value={editingBiz.sandboxToken || ''} onChange={e => setEditingBiz({ ...editingBiz, sandboxToken: e.target.value })} placeholder="Paste token here..." /></div>
                                            <div className="bg-gray-50 p-4 rounded-xl border border-gray-200"><Input label="Production Auth Token" type="password" value={editingBiz.productionToken || ''} onChange={e => setEditingBiz({ ...editingBiz, productionToken: e.target.value })} placeholder="Paste token here..." /></div>
                                            <h4 className="font-bold text-gray-900 border-b border-gray-100 pb-2 pt-2">Feature Rules</h4>
                                            <div className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl border border-gray-200 cursor-pointer hover:border-black transition-colors" onClick={() => setEditingBiz({ ...editingBiz, allowRetailFed: !editingBiz.allowRetailFed })}><input type="checkbox" className="w-4 h-4 cursor-pointer accent-black" checked={editingBiz.allowRetailFed || false} readOnly /><label className="text-sm font-medium cursor-pointer flex-1">Enable Retail Price & FED Fields</label></div>
                                            <h4 className="font-bold text-gray-900 border-b border-gray-100 pb-2 pt-2">Default Rates</h4>
                                            <div className="grid grid-cols-3 gap-3"><Input label="Sales Tax %" type="number" value={editingBiz.taxRates?.salesTax || 18} onChange={e => setEditingBiz({ ...editingBiz, taxRates: { ...(editingBiz.taxRates || {}), salesTax: parseFloat(e.target.value) } })} /><Input label="Further Tax %" type="number" value={editingBiz.taxRates?.furtherTax || 4} onChange={e => setEditingBiz({ ...editingBiz, taxRates: { ...(editingBiz.taxRates || {}), furtherTax: parseFloat(e.target.value) } })} /><Input label="Extra Tax %" type="number" value={editingBiz.taxRates?.extraTax || 0} onChange={e => setEditingBiz({ ...editingBiz, taxRates: { ...(editingBiz.taxRates || {}), extraTax: parseFloat(e.target.value) } })} /></div>
                                        </div>
                                    </div>
                                    <div className="flex justify-end gap-3 mt-10 border-t border-gray-100 pt-6"><Button onClick={() => setShowBizModal(false)} variant="secondary">Cancel</Button><Button onClick={saveBusiness}>Save Business</Button></div>
                                </div>
                            </div>
                        )}

                        {editingUser && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                                <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto">
                                    <div className="flex justify-between items-center mb-8 border-b border-gray-100 pb-4"><h3 className="text-2xl font-bold text-gray-900 flex items-center gap-3"><Icons.User /> {editingUser.id ? `Manage User` : 'Create New User'}</h3><button onClick={() => setEditingUser(null)} className="text-gray-400 hover:text-black hover:bg-gray-100 p-2 rounded-full transition-colors"><Icons.X size={24}/></button></div>
                                    {adminError && <div className="mb-6 p-4 bg-red-50 text-red-600 font-medium text-sm rounded-xl border border-red-100">{adminError}</div>}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-5">
                                            <h4 className="font-bold text-sm text-gray-900 uppercase tracking-wider border-b border-gray-100 pb-2">1. Account Details</h4>
                                            <Input label="Username" value={editingUser.username} onChange={e => setEditingUser({ ...editingUser, username: e.target.value })} required />
                                            <Input label={editingUser.id ? "New Password (Optional)" : "Password"} type="password" value={editingUser.password || ''} onChange={e => setEditingUser({ ...editingUser, password: e.target.value })} placeholder={editingUser.id ? "Leave blank to keep current" : ""} />
                                            {editingUser.id && (
                                                <div className="bg-gray-50 p-5 rounded-xl border border-gray-200 flex justify-between items-center mt-4">
                                                    <div><div className="text-xs font-bold text-gray-500 uppercase tracking-wide">Login Access</div><div className={`text-sm font-bold mt-1 ${editingUser.isRevoked ? 'text-red-600' : 'text-green-600'}`}>{editingUser.isRevoked ? 'Disabled' : 'Active'}</div></div>
                                                    <Button variant={editingUser.isRevoked ? "primary" : "danger"} className="text-xs" onClick={() => setEditingUser({...editingUser, isRevoked: !editingUser.isRevoked})}>{editingUser.isRevoked ? "Enable Login" : "Disable Login"}</Button>
                                                </div>
                                            )}
                                        </div>
                                        <div className="space-y-5">
                                            <h4 className="font-bold text-sm text-gray-900 uppercase tracking-wider border-b border-gray-100 pb-2">2. Business Access</h4>
                                            <div className="flex flex-col gap-3 bg-gray-50 p-4 rounded-xl border border-gray-200">
                                                <div className="flex items-end gap-3">
                                                    <div className="flex-1"><SearchableDropdown label="Find Business" value={bizToAdd} options={businesses.filter(b => !editingUser.access?.some(a => a.businessId === b.id)).map(b => b.businessName)} onChange={setBizToAdd} strict={false} /></div>
                                                    <div className="w-32"><label className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider pl-1 block mb-1.5">Role</label><select className="standard-input" value={roleToAdd} onChange={e => setRoleToAdd(e.target.value)}><option value="admin">Admin</option><option value="edit">Edit Data</option><option value="view">View Only</option></select></div>
                                                </div>
                                                <Button onClick={() => { const b = businesses.find(x => x.businessName === bizToAdd); if (b) { setEditingUser(p => ({ ...p, access: [...(p.access || []), { businessId: b.id, businessName: b.businessName, accessLevel: roleToAdd }] })); setBizToAdd(""); } }} className="w-full">Assign Business</Button>
                                            </div>
                                            <div className="space-y-3 max-h-[300px] overflow-y-auto">
                                                {(!editingUser.access || editingUser.access.length === 0) ? <div className="text-center p-6 text-sm text-gray-400 border border-dashed border-gray-200 rounded-xl bg-gray-50/50">No businesses assigned yet.</div> : 
                                                    editingUser.access.map(a => (
                                                        <div key={a.businessId} className="flex items-center justify-between p-4 border border-gray-100 rounded-xl shadow-sm bg-white hover:border-gray-300 transition-colors">
                                                            <div><div className="font-bold text-gray-900">{a.businessName}</div><div className="text-[10px] text-gray-500 uppercase tracking-wider mt-1">Role: <span className="text-black font-bold">{a.accessLevel}</span></div></div>
                                                            <button onClick={() => setEditingUser(p => ({...p, access: p.access.filter(x => x.businessId !== a.businessId)}))} className="text-gray-400 hover:text-red-600 bg-gray-50 hover:bg-red-50 p-2.5 rounded-lg transition-colors"><Icons.Trash2 size={18}/></button>
                                                        </div>
                                                    ))
                                                }
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex justify-end gap-3 mt-10 border-t border-gray-100 pt-6"><Button onClick={() => setEditingUser(null)} variant="secondary">Cancel</Button><Button onClick={saveUser}><Icons.Save /> Save User</Button></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'businesses' && (
                            <div className="flex flex-col gap-4">
                                {filteredBiz.length > 0 ? filteredBiz.map(biz => {
                                    const daysLeft = Math.ceil((new Date(biz.expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
                                    return (
                                        <Card key={biz.id} className={`p-5 flex flex-col md:flex-row justify-between items-center gap-5 border-l-4 ${biz.isRevoked ? 'border-red-500 bg-red-50/30' : 'border-black'}`}>
                                            <div className="flex-1">
                                                <div className="font-bold text-xl text-gray-900 flex items-center gap-3">
                                                    {biz.businessName} 
                                                    {biz.isRevoked && <span className="text-[10px] bg-red-100 text-red-700 px-2.5 py-1 rounded-md tracking-wider font-semibold">REVOKED</span>}
                                                    <span className={`text-[10px] px-2.5 py-1 rounded-md tracking-wider uppercase font-semibold ${biz.integrationMode === 'production' ? 'bg-gray-800 text-white' : 'bg-yellow-100 text-yellow-800'}`}>{biz.integrationMode}</span>
                                                </div>
