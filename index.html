    <style>

        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; } .fbr-table { width: max-content; min-width: 100%; background: white; border-collapse: collapse; } .fbr-table th, .fbr-table td { white-space: nowrap !important; padding: 8px 12px; vertical-align: middle; border-bottom: 1px solid #e2e8f0; } .fbr-table .desc-col { min-width: 250px; } .fbr-table .hs-col { min-width: 180px; }

</head>

<body class="bg-gray-50 text-gray-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Component } = React;

        const SYSTEM_CONFIG = { BASE_URL: "https://gw.fbr.gov.pk", PATHS: { POST_INVOICE_SB: "/di_data/v1/di/postinvoicedata_sb", POST_INVOICE_PROD: "/di_data/v1/di/postinvoicedata", VALIDATE_INVOICE_SB: "/di_data/v1/di/validateinvoicedata_sb", VALIDATE_INVOICE_PROD: "/di_data/v1/di/validateinvoicedata", PROVINCES: "/pdi/v1/provinces", DOCTYPECODE: "/pdi/v1/doctypecode", SROITEMCODE: "/pdi/v1/sroitemcode", TRANSTYPECODE: "/pdi/v1/transtypecode", UOM: "/pdi/v1/uom", HS_UOM: "/pdi/v2/HS_UOM", ITEM_CODE: "/pdi/v1/itemdesccode", GET_REG_TYPE: "/dist/v1/Get_Reg_Type" } };
        const SALE_TYPES = [ "Goods at standard rate (default)", "Goods at reduced rate", "Goods at zero-rate", "Petroleum Products", "Electricity Supply to Retailers", "SIM", "Gas to CNG stations", "Mobile Phones", "Processing/Conversion of Goods", "3rd Schedule Goods", "Goods (FED in ST Mode)", "Services (FED in ST Mode)", "Services", "Exempt goods", "DTRE goods", "Cotton ginners", "Electric Vehicle", "Cement /Concrete Block", "Telecommunication services", "Steel melting and re-rolling", "Ship breaking", "Potassium Chlorate", "CNG Sales", "Goods as per SRO.297(I)/2023", "Toll Manufacturing", "Non-Adjustable Supplies" ];
        const DOCUMENT_TYPES = [ "Sale Invoice", "Debit Note" ];
        const UOM_OPTIONS = [ "Numbers, pieces, units", "MT", "Bill of lading", "SET", "KWH", "40KG", "Liter", "SqY", "Bag", "KG", "MMBTU", "Meter", "Carat", "Cubic Metre", "Dozen", "Gram", "Gallon", "Kilogram", "Pound", "Timber logs", "Packs", "Pair", "Square Foot", "Square Metre", "Thousand Unit", "Mega Watt", "Foot", "Barrels", "NO", "Others", "1000kWh" ];
        const PROVINCES = [ "Azad Jammu and Kashmir", "Balochistan", "Capital Territory", "FATA/PATA", "Gilgit Baltistan", "Khyber Pakhtunkhwa", "Punjab", "Sindh" ];
        const SCENARIOS = [ "SN001", "SN002", "SN003", "SN004", "SN005", "SN006", "SN007", "SN008", "SN009", "SN010", "SN011", "SN012", "SN013", "SN014", "SN015", "SN016", "SN017", "SN018", "SN019", "SN020", "SN021", "SN022", "SN023", "SN024", "SN025", "SN026", "SN027", "SN028" ];
        const FBR_ERRORS = { "0000": "Successful", "0001": "Invalid NTN/Reg. No. format", "0004": "Seller Reg No. doesn't match", "0005": "Buyer Name is empty/invalid", "0007": "Sale Type not allowed/invalid", "0009": "Provide UOM in KG", "0010": "Quantity/Electricity Units missing", "0011": "Provide Value of Sales Excl. ST", "0039": "STWH invoice fields must be same as sale invoice", "0041": "Invoice number cannot be empty", "0042": "Invoice date cannot be empty", "0044": "HS Code cannot be empty", "0053": "Buyer Registration Type is invalid", "0070": "User is not registered, STWH is allowed only for registered user", "0073": "Provide Sale Origination Province of Supplier", "0074": "Provide Destination of Supply", "0077": "SRO/Schedule Number cannot be empty", "0078": "Item serial number cannot be empty", "0082": "The Seller is not registered for sales tax", "0106": "The Buyer is not registered for sales tax", "0401": "Unauthorized access: Seller NTN/CNIC token is invalid", "0402": "Unauthorized access: Buyer NTN/CNIC token is invalid" };

        class ErrorBoundary extends Component { constructor(props) { super(props); this.state = { hasError: false, error: null }; } static getDerivedStateFromError(error) { return { hasError: true, error }; } render() { if (this.state.hasError) return (<div className="min-h-screen flex items-center justify-center"><div className="bg-white p-8 rounded-lg shadow-xl"><h1 className="text-xl font-bold mb-2">Error Occurred</h1><button onClick={() => { localStorage.clear(); sessionStorage.clear(); window.location.reload(); }} className="bg-black text-white px-4 py-2 rounded">Reset App Data</button></div></div>); return this.props.children; } }

        const IconBase = ({ size = 20, children, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>{children}</svg> );
        const Icons = {
            FileText: (props) => <IconBase {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /></IconBase>, Settings: (props) => <IconBase {...props}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></IconBase>, Plus: (props) => <IconBase {...props}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></IconBase>, Trash2: (props) => <IconBase {...props}><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></IconBase>, Save: (props) => <IconBase {...props}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></IconBase>, Printer: (props) => <IconBase {...props}><polyline points="6 9 6 0 18 0 18 9" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><rect x="6" y="14" width="12" height="8" /></IconBase>, CheckCircle: (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></IconBase>, AlertCircle: (props) => <IconBase {...props}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></IconBase>, X: (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></IconBase>, ShieldCheck: (props) => <IconBase {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><path d="m9 12 2 2 4-4" /></IconBase>, ShoppingCart: (props) => <IconBase {...props}><circle cx="9" cy="21" r="1" /><circle cx="20" cy="21" r="1" /><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" /></IconBase>, User: (props) => <IconBase {...props}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></IconBase>, LogOut: (props) => <IconBase {...props}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></IconBase>, Box: (props) => <IconBase {...props}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></IconBase>, Users: (props) => <IconBase {...props}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></IconBase>, Search: (props) => <IconBase {...props}><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></IconBase>, Calendar: (props) => <IconBase {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></IconBase>, Edit: (props) => <IconBase {...props}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></IconBase>, Download: (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></IconBase>, Eye: (props) => <IconBase {...props}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></IconBase>, Briefcase: (props) => <IconBase {...props}><rect x="2" y="7" width="20" height="14" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></IconBase>
        };

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, title }) => {
            const variants = { primary: "bg-black text-white hover:bg-gray-800 disabled:bg-gray-400", secondary: "bg-white text-gray-800 border border-gray-300 hover:bg-gray-50", danger: "bg-red-50 text-red-600 hover:bg-red-100 border border-red-200", ghost: "bg-transparent text-gray-600 hover:bg-gray-100 border-none" };
            return <button title={title} onClick={onClick} disabled={disabled} className={`px-4 py-2 rounded-lg font-medium transition-colors duration-200 flex items-center justify-center gap-2 ${variants[variant]} ${className}`}>{children}</button>;
        };

        const Card = ({ children, className = '', onClick }) => <div onClick={onClick} className={`bg-white rounded-xl shadow-sm border border-gray-200 ${className}`}>{children}</div>;

        const Input = ({ label, value, onChange, type = "text", placeholder = "", required = false, className = "", readOnly = false }) => (
            <div className={`flex flex-col gap-1 ${className}`}>
                {label && <label className="text-xs font-semibold text-gray-500 uppercase">{label} {required && <span className="text-red-500">*</span>}</label>}
                <input type={type} value={value} onChange={onChange} placeholder={placeholder} readOnly={readOnly} className={`standard-input rounded-lg ${readOnly ? 'bg-gray-100 text-gray-500 cursor-not-allowed' : ''}`} />
            </div>
        );

        const SearchableDropdown = ({ label, value, onChange = () => {}, options = [], placeholder, strict = true, status = null, readOnly = false }) => {
            const [show, setShow] = useState(false);
            const [filter, setFilter] = useState("");
            const wrapperRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (e) => { if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setShow(false); };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const safeOptions = Array.isArray(options) ? options : [];
            const filteredOptions = safeOptions.filter(opt => String(opt).toLowerCase().includes(filter.toLowerCase()));

            return (
                <div className="flex flex-col gap-1 relative w-full" ref={wrapperRef}>
                    <div className="flex justify-between items-center">
                        {label && <label className="text-xs font-semibold text-gray-500 uppercase">{label}</label>}
                        {status && <span className={`text-[10px] px-1 rounded ${status.type === 'error' ? 'text-red-600 bg-red-50' : 'text-gray-600 bg-gray-100'}`}>{status.text}</span>}
                    </div>
                    <div className="relative">
                        <input type="text" value={value || ""} readOnly={strict || readOnly} className={`standard-input rounded-lg ${strict || readOnly ? 'cursor-pointer' : ''}`} placeholder={placeholder} onClick={() => { if (!readOnly) { setShow(!show); setFilter(""); } }} onChange={!strict && !readOnly ? (e) => onChange(e.target.value) : undefined} />
                        {strict && !readOnly && <div className="absolute right-2 top-2.5 text-gray-400 pointer-events-none"><Icons.Settings size={14} /></div>}
                    </div>
                    {show && !readOnly && (
                        <div className="absolute top-full left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-xl z-50 overflow-hidden">
                            <div className="p-2 border-b border-gray-100"><input autoFocus type="text" className="w-full text-xs p-1 outline-none" placeholder="Search..." value={filter} onChange={e => setFilter(e.target.value)} /></div>
                            <div className="max-h-48 overflow-y-auto">
                                {filteredOptions.length > 0 ? filteredOptions.slice(0, 50).map((opt, i) => (
                                    <div key={i} className="px-3 py-2 hover:bg-gray-100 cursor-pointer text-sm text-gray-700" onClick={() => { onChange(opt); setShow(false); }}>{opt}</div>
                                )) : <div className="p-2 text-xs text-center text-gray-400">No options found</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const formatCurrency = (val) => parseFloat(val || 0).toLocaleString('en-PK', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const getToday = () => new Date().toISOString().split('T')[0];

        const fbrFetch = async (url, options = {}) => {
            if (!url.startsWith(SYSTEM_CONFIG.BASE_URL)) return fetch(url, options);
            const proxyPayload = { endpoint: url.replace(SYSTEM_CONFIG.BASE_URL, ''), method: options.method || 'GET', headers: options.headers || {} };
            if (options.body) { try { proxyPayload.payload = JSON.parse(options.body); } catch { proxyPayload.payload = options.body; } }
            const sessionToken = sessionStorage.getItem('fbr_token');
            if (!sessionToken) return { ok: false, status: 401, json: async () => ({ error: "Missing token" }) };
            const res = await fetch('https://app.tallied.pk/api/fbr/proxy', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` }, body: JSON.stringify(proxyPayload) });
            if (!res.ok) return res;
            const proxyData = await res.json();
            return { ok: proxyData.ok, status: proxyData.status, json: async () => proxyData.data };
        };

        const BusinessSelectionScreen = ({ user, onSelect, onLogout }) => {
            const [searchQuery, setSearchQuery] = useState("");
            const filteredBiz = user.accessibleBusinesses.filter(b => b.name.toLowerCase().includes(searchQuery.toLowerCase()));

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col">
                    <nav className="bg-black text-white shadow-lg sticky top-0 z-50">
                        <div className="max-w-[1600px] mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-2 font-bold"><Icons.ShieldCheck /> FBR Invoice System</div>
                            <Button onClick={onLogout} variant="danger" className="text-xs py-1"><Icons.LogOut size={16}/> {user.isAdminImpersonating ? 'Return to Admin' : 'Logout'}</Button>
                        </div>
                    </nav>
                    <main className="max-w-[1600px] mx-auto w-full p-6 mt-4">
                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                            <div>
                                <h2 className="text-3xl font-bold text-gray-900">Select a Business</h2>
                                <p className="text-gray-500 mt-1">Search and select the business account you want to manage today.</p>
                            </div>
                            <div className="relative w-64">
                                <input type="text" placeholder="Search businesses..." className="px-3 py-2 border border-gray-300 rounded-lg outline-none w-full pl-8 text-sm" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                <span className="absolute left-2 top-2.5 text-gray-400"><Icons.Search size={14} /></span>
                            </div>
                        </div>
                        <div className="flex flex-col gap-4">
                            {filteredBiz.length > 0 ? filteredBiz.map(b => (
                                <Card key={b.id} className="p-4 flex flex-col md:flex-row justify-between items-center gap-4 border-l-4 border-black hover:shadow-md transition-shadow cursor-pointer bg-white hover:bg-gray-50" onClick={() => onSelect(b.id)}>
                                    <div className="flex-1 flex items-center gap-4">
                                        <div className="bg-gray-100 p-3 rounded-lg"><Icons.Briefcase className="text-gray-500" size={24}/></div>
                                        <div>
                                            <h3 className="font-bold text-xl text-gray-900">{b.name}</h3>
                                            <p className="text-xs text-gray-500 uppercase mt-1 font-semibold">Your Role: <span className="text-blue-600">{b.accessLevel}</span></p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-6">
                                        <Button variant="secondary" className="text-sm bg-white border-gray-300">Open Dashboard</Button>
                                    </div>
                                </Card>
                            )) : <div className="text-center py-8 text-gray-400">No businesses match your search.</div>}
                        </div>
                    </main>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isAppLoading, setIsAppLoading] = useState(true);

            useEffect(() => {
                const loadSession = async () => {
                    try {
                        let session = null;
                        if (window.localforage) session = await window.localforage.getItem('fbr_session');
                        if (!session) {
                            const oldSession = sessionStorage.getItem('fbr_session');
                            if (oldSession) session = JSON.parse(oldSession);
                        }
                        if (session) setUser(session);
                    } catch (e) {
                        sessionStorage.clear();
                        if (window.localforage) await window.localforage.clear();
                        setUser(null);
                    } finally { setIsAppLoading(false); }
                };
                loadSession();
            }, []);

            const handleLogin = async (u) => {
                setUser(u);
                try {
                    sessionStorage.setItem('fbr_session', JSON.stringify(u)); 
                    if (window.localforage) await window.localforage.setItem('fbr_session', u);
                } catch(e) {}
            };

            const handleLogout = async (e, force = false) => {
                if (e && e.preventDefault) e.preventDefault();
                if (user && user.isAdminImpersonating && !force) return handleExitImpersonation();
                sessionStorage.clear(); localStorage.clear();
                if (window.localforage) await window.localforage.clear().catch(()=>{});
                window.location.href = window.location.pathname + '?logout=' + Date.now();
            };

            const handleBusinessSwitch = async (businessId) => {
                try {
                    const res = await fetch('https://app.tallied.pk/api/switch-business', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionStorage.getItem('fbr_token')}` },
                        body: JSON.stringify({ businessId })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        sessionStorage.setItem('fbr_token', data.token);
                        window.location.hash = 'invoice';
                        await handleLogin(data.user);
                        window.location.reload();
                    } else { alert("Failed to switch business context."); }
                } catch (e) { alert("Network Error"); }
            };

            const handleImpersonate = async (userId) => {
                try {
                    const response = await fetch('https://app.tallied.pk/api/admin/impersonate', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionStorage.getItem('fbr_token')}` },
                        body: JSON.stringify({ userId })
                    });
                    const data = await response.json();
                    if (response.ok && data.token) {
                        sessionStorage.setItem('fbr_admin_backup', JSON.stringify(user));
                        sessionStorage.setItem('fbr_admin_token', sessionStorage.getItem('fbr_token'));
                        if (window.localforage) await window.localforage.setItem('fbr_admin_backup', user);
                        const clientUser = { ...data.user, isAdminImpersonating: true };
                        sessionStorage.setItem('fbr_token', data.token);
                        sessionStorage.setItem('fbr_session', JSON.stringify(clientUser));
                        if (window.localforage) await window.localforage.setItem('fbr_session', clientUser);
                        window.location.reload();
                    } else { alert(data.error || "Failed to impersonate"); }
                } catch (err) { alert("Network error connecting to User."); }
            };

            const handleExitImpersonation = async () => {
                try {
                    const fallbackBackup = sessionStorage.getItem('fbr_admin_backup');
                    const fallbackToken = sessionStorage.getItem('fbr_admin_token');
                    sessionStorage.removeItem('fbr_admin_backup'); sessionStorage.removeItem('fbr_admin_token');
                    if (window.localforage) await window.localforage.removeItem('fbr_admin_backup').catch(()=>{});
                    if (fallbackBackup && fallbackToken) {
                        const adminUser = JSON.parse(fallbackBackup);
                        sessionStorage.setItem('fbr_token', fallbackToken);
                        sessionStorage.setItem('fbr_session', fallbackBackup);
                        if (window.localforage) await window.localforage.setItem('fbr_session', adminUser).catch(()=>{});
                        window.location.hash = ''; 
                        window.location.reload();
                    } else { handleLogout(null, true); }
                } catch (err) { window.location.href = window.location.pathname + '?logout=' + Date.now(); }
            };

            if (isAppLoading) return <div className="min-h-screen flex items-center justify-center bg-gray-50 text-gray-500">Loading System...</div>;
            if (!user) return <LoginScreen onLogin={handleLogin} />;
            
            if (user.needsBusinessSelection) {
                return <BusinessSelectionScreen user={user} onSelect={handleBusinessSwitch} onLogout={handleLogout} />;
            }

            if (user.role !== 'admin' && (!user.settings || !user.businessStatus)) return <LoginScreen onLogin={handleLogin} />;

            return (
                <ErrorBoundary>
                    {user.role === 'admin' ? <AdminDashboard onLogout={handleLogout} onImpersonate={handleImpersonate} /> : <ClientDashboard user={user} setUser={handleLogin} onLogout={handleLogout} onSwitch={handleBusinessSwitch} />}
                </ErrorBoundary>
            );
        }

        const LoginScreen = ({ onLogin }) => {
            const [form, setForm] = useState({ username: '', password: '' });
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async () => {
                if (!form.username || !form.password) return setError("Fill all fields");
                setLoading(true);
                try {
                    const res = await fetch('https://app.tallied.pk/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) });
                    const data = await res.json();
                    if (res.ok) { sessionStorage.setItem('fbr_token', data.token); onLogin(data.user); } 
                    else setError(data.error || "Invalid credentials");
                } catch (e) { setError("Network Error"); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-white">
                    <div className="bg-white p-8 rounded-xl border border-gray-200 shadow-xl w-full max-w-md">

                        {error && <div className="bg-red-50 text-red-600 p-3 rounded mb-4 text-sm text-center border">{error}</div>}
                        <div className="space-y-4"><Input label="Username" value={form.username} onChange={e => setForm({ ...form, username: e.target.value })} /><Input label="Password" type="password" value={form.password} onChange={e => setForm({ ...form, password: e.target.value })} /><Button onClick={handleSubmit} disabled={loading} className="w-full py-3">{loading ? 'Loading...' : 'Login'}</Button></div>

            const [activeTab, setActiveTab] = useState(() => window.location.hash.replace('#', '') || 'businesses');
            useEffect(() => { const handleHash = () => { const hash = window.location.hash.replace('#', ''); if(['businesses', 'users'].includes(hash)) setActiveTab(hash); }; window.addEventListener('hashchange', handleHash); return () => window.removeEventListener('hashchange', handleHash); }, []);
            const changeTab = (t) => { window.location.hash = t; };

                    fetch('https://app.tallied.pk/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } })

                if (uRes.ok) setUsers(await uRes.json());
            };

            useEffect(() => { fetchData(); }, [activeTab]);

            const saveBusiness = async () => {
                setAdminError(""); if (!editingBiz.businessName) return setAdminError("Business Name is required");
                const url = editingBiz.id ? `https://app.tallied.pk/api/admin/businesses/${editingBiz.id}` : 'https://app.tallied.pk/api/admin/businesses';
                const method = editingBiz.id ? 'PUT' : 'POST';
                try {
                    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionStorage.getItem('fbr_token')}` }, body: JSON.stringify(editingBiz) });

                                <div className="flex bg-gray-800 rounded p-1">

                                                    <div className="border-t pt-3"><div className="font-bold mb-2 text-sm">Subscription Expiry</div><Input type="date" value={(editingBiz.expiryDate || new Date().toISOString()).split('T')[0]} onChange={e => setEditingBiz({ ...editingBiz, expiryDate: new Date(e.target.value).toISOString() })} /><div className="flex gap-2 mt-2"><button onClick={() => { const d = new Date(); d.setDate(d.getDate() + 30); setEditingBiz({ ...editingBiz, expiryDate: d.toISOString() }) }} className="text-xs bg-white border px-2 py-1 rounded">+30 Days</button><button onClick={() => { const d = new Date(); d.setDate(d.getDate() + 365); setEditingBiz({ ...editingBiz, expiryDate: d.toISOString() }) }} className="text-xs bg-white border px-2 py-1 rounded">+1 Year</button></div></div>
                                                </div>

                                            <Input label="Business Name" value={editingBiz.businessName} onChange={e => setEditingBiz({ ...editingBiz, businessName: e.target.value })} required />
                                            <div className="grid grid-cols-2 gap-2"><Input label="NTN" value={editingBiz.ntn} onChange={e => setEditingBiz({ ...editingBiz, ntn: e.target.value })} /><Input label="STRN" value={editingBiz.strn} onChange={e => setEditingBiz({ ...editingBiz, strn: e.target.value })} /></div>
                                            <Input label="Address" value={editingBiz.address} onChange={e => setEditingBiz({ ...editingBiz, address: e.target.value })} />
                                            <SearchableDropdown label="Province" value={editingBiz.province} options={PROVINCES} onChange={val => setEditingBiz({ ...editingBiz, province: val })} />
                                        </div>
                                        <div className="space-y-4">
                                            <h4 className="font-bold text-gray-700 border-b pb-2">FBR Configuration</h4>
                                            <select className="w-full border p-2 rounded text-sm outline-none" value={editingBiz.integrationMode} onChange={e => setEditingBiz({ ...editingBiz, integrationMode: e.target.value })}><option value="sandbox">Sandbox Mode</option><option value="production">Production Mode</option></select>
                                            <div className="bg-yellow-50 p-3 rounded border border-yellow-200"><h5 className="font-bold text-xs mb-2">Sandbox (Simulation)</h5><Input label="Sandbox Auth Token" value={editingBiz.sandboxToken || ''} onChange={e => setEditingBiz({ ...editingBiz, sandboxToken: e.target.value })} /></div>
                                            <div className="bg-gray-100 p-3 rounded border border-gray-200"><h5 className="font-bold text-xs mb-2">Production (Live)</h5><Input label="Production Auth Token" value={editingBiz.productionToken || ''} onChange={e => setEditingBiz({ ...editingBiz, productionToken: e.target.value })} /></div>
                                            <h4 className="font-bold text-gray-700 border-b pb-2 pt-2">Feature Control</h4>
                                            <div className="flex items-center gap-2"><input type="checkbox" id="allowRetailFed" checked={editingBiz.allowRetailFed || false} onChange={e => setEditingBiz({ ...editingBiz, allowRetailFed: e.target.checked })} /><label htmlFor="allowRetailFed" className="text-sm">Allow Retail Price & FED Fields</label></div>
                                            <h4 className="font-bold text-gray-700 border-b pb-2 pt-2">Default Rates</h4>
                                            <div className="grid grid-cols-3 gap-2"><Input label="Sales Tax %" type="number" value={editingBiz.taxRates?.salesTax || 18} onChange={e => setEditingBiz({ ...editingBiz, taxRates: { ...(editingBiz.taxRates || {}), salesTax: parseFloat(e.target.value) } })} /><Input label="Further Tax %" type="number" value={editingBiz.taxRates?.furtherTax || 4} onChange={e => setEditingBiz({ ...editingBiz, taxRates: { ...(editingBiz.taxRates || {}), furtherTax: parseFloat(e.target.value) } })} /><Input label="Extra Tax %" type="number" value={editingBiz.taxRates?.extraTax || 0} onChange={e => setEditingBiz({ ...editingBiz, taxRates: { ...(editingBiz.taxRates || {}), extraTax: parseFloat(e.target.value) } })} /></div>
                                        </div>
                                    </div>
                                    <div className="flex justify-end gap-3 mt-8 border-t pt-4"><Button onClick={() => setShowBizModal(false)} variant="secondary">Cancel</Button><Button onClick={saveBusiness}>Save Business</Button></div>
                                </div>
                            </div>
                        )}

                        {editingUser && (
                            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white p-6 rounded-lg w-full max-w-4xl max-h-[90vh] overflow-y-auto">
                                    <div className="flex justify-between items-center mb-6 border-b pb-4"><h3 className="text-xl font-bold flex items-center gap-2"><Icons.User /> {editingUser.id ? `Manage User: ${editingUser.username}` : 'Create New User'}</h3><button onClick={() => setEditingUser(null)} className="text-gray-400 hover:text-black transition-colors"><Icons.X /></button></div>
                                    {adminError && <div className="mb-4 p-3 bg-red-50 text-red-600 font-bold text-sm rounded border">{adminError}</div>}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-4">
                                            <h4 className="font-bold text-sm text-gray-700 uppercase tracking-wide border-b pb-2">1. Account Details</h4>
                                            <Input label="Username" value={editingUser.username} onChange={e => setEditingUser({ ...editingUser, username: e.target.value })} required />
                                            <Input label={editingUser.id ? "New Password (Optional)" : "Password"} type="password" value={editingUser.password || ''} onChange={e => setEditingUser({ ...editingUser, password: e.target.value })} placeholder={editingUser.id ? "Leave blank to keep current" : ""} />
                                            {editingUser.id && (
                                                <div className="bg-gray-50 p-4 rounded border border-gray-200 flex justify-between items-center mt-4">
                                                    <div><div className="text-xs font-bold text-gray-500 uppercase">Login Access</div><div className={`text-sm font-bold ${editingUser.isRevoked ? 'text-red-600' : 'text-green-600'}`}>{editingUser.isRevoked ? 'Disabled' : 'Enabled'}</div></div>
                                                    <Button variant={editingUser.isRevoked ? "primary" : "danger"} className="text-xs" onClick={() => setEditingUser({...editingUser, isRevoked: !editingUser.isRevoked})}>{editingUser.isRevoked ? "Enable Login" : "Disable Login"}</Button>
                                                </div>
                                            )}
                                        </div>
                                        <div className="space-y-4">
                                            <h4 className="font-bold text-sm text-gray-700 uppercase tracking-wide border-b pb-2">2. Business Access</h4>
                                            <div className="text-xs text-gray-500">Search and add businesses to this user's account.</div>
                                            <div className="flex items-end gap-2 bg-blue-50 p-3 rounded-lg border border-blue-100">
                                                <div className="flex-1"><SearchableDropdown label="Find Business" value={bizToAdd} options={businesses.filter(b => !editingUser.access?.some(a => a.businessId === b.id)).map(b => b.businessName)} onChange={setBizToAdd} strict={false} /></div>
                                                <div><label className="text-xs font-semibold text-gray-500 uppercase">Role</label><select className="standard-input rounded-lg bg-white" value={roleToAdd} onChange={e => setRoleToAdd(e.target.value)}><option value="admin">Full Admin</option><option value="edit">Edit Data</option><option value="view">View Only</option></select></div>
                                                <Button onClick={() => { const b = businesses.find(x => x.businessName === bizToAdd); if (b) { setEditingUser(p => ({ ...p, access: [...(p.access || []), { businessId: b.id, businessName: b.businessName, accessLevel: roleToAdd }] })); setBizToAdd(""); } }}>Add</Button>
                                            </div>
                                            <div className="space-y-2 max-h-[300px] overflow-y-auto">
                                                {(!editingUser.access || editingUser.access.length === 0) ? <div className="text-center p-4 text-xs text-gray-400 border border-dashed rounded">No businesses assigned.</div> : 
                                                    editingUser.access.map(a => (
                                                        <div key={a.businessId} className="flex items-center justify-between p-3 border rounded shadow-sm bg-white">
                                                            <div><div className="text-sm font-bold text-gray-900">{a.businessName}</div><div className="text-[10px] text-gray-500 uppercase mt-1">Role: <span className="text-blue-600 font-bold">{a.accessLevel}</span></div></div>
                                                            <button onClick={() => setEditingUser(p => ({...p, access: p.access.filter(x => x.businessId !== a.businessId)}))} className="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded"><Icons.Trash2 size={16}/></button>
                                                        </div>
                                                    ))
                                                }
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex justify-end gap-3 mt-8 border-t pt-4"><Button onClick={() => setEditingUser(null)} variant="secondary">Cancel</Button><Button onClick={saveUser}><Icons.Save /> Save User</Button></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'businesses' && (
                            <div className="flex flex-col gap-4">
                                {filteredBiz.length > 0 ? filteredBiz.map(biz => {
                                    const daysLeft = Math.ceil((new Date(biz.expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
                                    return (
                                        <Card key={biz.id} className={`p-4 flex flex-col md:flex-row justify-between items-center gap-4 border-l-4 ${biz.isRevoked ? 'border-red-600 opacity-75 bg-red-50' : 'border-black hover:shadow-md transition-shadow'}`}>
                                            <div className="flex-1">
                                                <div className="font-bold text-lg text-gray-900 flex items-center gap-3">{biz.businessName} {biz.isRevoked && <span className="text-[10px] bg-red-600 text-white px-2 py-1 rounded tracking-wide">REVOKED</span>}<span className={`text-[10px] px-2 py-1 rounded tracking-wide uppercase ${biz.integrationMode === 'production' ? 'bg-gray-800 text-white' : 'bg-yellow-200 text-yellow-800'}`}>{biz.integrationMode}</span></div>
                                                <div className="text-sm text-gray-500 mt-1">NTN: {biz.ntn || 'N/A'} • {biz.province}</div>
                                            </div>
                                            <div className="flex items-center gap-6"><div className={`text-sm font-bold flex items-center gap-1 ${daysLeft < 7 ? 'text-red-600' : 'text-gray-600'}`}><Icons.Calendar size={14}/> {daysLeft} Days Left</div><Button onClick={() => { setEditingBiz(biz); setShowBizModal(true); }} variant="secondary" className="text-sm">Manage Profile & Billing</Button></div>
                                        </Card>
                                    );
                                }) : <div className="text-center py-8 text-gray-400">No businesses match your search.</div>}
                            </div>
                        )}

                        {activeTab === 'users' && (
                            <div className="flex flex-col gap-4">
                                {filteredUsers.length > 0 ? filteredUsers.map(u => (
                                    <Card key={u.id} className={`p-4 flex flex-col md:flex-row justify-between items-center gap-4 border-l-4 ${u.isRevoked ? 'opacity-60 border-red-600 bg-red-50' : 'border-blue-600 hover:shadow-md transition-shadow'}`}>
                                        <div className="flex-1">
                                            <div className="font-bold text-lg text-gray-900 flex items-center gap-3"><Icons.User size={20}/> {u.username} {u.isRevoked && <span className="text-[10px] bg-red-600 text-white px-2 py-1 rounded tracking-wide">LOGIN DISABLED</span>}</div>
                                            <div className="text-sm text-gray-500 mt-1">Assigned to <span className="font-bold text-black">{u.access?.length || 0}</span> businesses.</div>
                                        </div>
                                        <div className="flex items-center gap-3"><Button onClick={() => onImpersonate(u.id)} variant="secondary" className="text-sm bg-white" disabled={u.isRevoked}><Icons.Eye size={16}/> Login As</Button><Button onClick={() => setEditingUser(u)} variant="primary" className="text-sm">Manage User</Button></div>
                                    </Card>
                                )) : <div className="text-center py-8 text-gray-400">No users match your search.</div>}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const ClientDashboard = ({ user, setUser, onLogout, onSwitch }) => {
            const isRevoked = user.businessStatus?.isRevoked;
            const daysLeft = Math.ceil((new Date(user.businessStatus?.expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
            if (isRevoked) { return (<div className="min-h-screen flex items-center justify-center bg-gray-50 p-6"><div className="bg-white p-8 rounded-lg shadow-xl max-w-md w-full border-t-4 border-red-600 text-center"><Icons.AlertCircle size={48} className="mx-auto text-red-600 mb-4" /><h1 className="text-2xl font-bold text-gray-900 mb-2">Access Revoked</h1><p className="text-gray-600 mb-6">Your access to <b>{user.settings?.businessName}</b> has been suspended.</p><Button onClick={onLogout} className="w-full bg-red-600 hover:bg-red-700">Return to Portal</Button></div></div>); }

            const [activeTab, setActiveTab] = useState(() => window.location.hash.replace('#', '') || 'invoice');
            useEffect(() => { const handleHash = () => { const hash = window.location.hash.replace('#', ''); if (hash) setActiveTab(hash); }; window.addEventListener('hashchange', handleHash); return () => window.removeEventListener('hashchange', handleHash); }, []);
            const changeTab = (t) => { window.location.hash = t; setActiveTab(t); };

            const [invoice, setInvoice] = useState({ type: "Sale Invoice", invoiceDate: getToday(), invoiceNumber: `INV-${Date.now().toString().slice(-6)}`, refInvoiceNumber: "", customerName: "", customerNTN: "", customerDestination: "", customerRegType: "Unregistered", originationProvince: user?.settings?.province || "Sindh", customerAddress: "", scenarioId: "SN001", items: [], discount: 0 });
            
            const defaultLineItem = { id: '', desc: '', hsCode: '', qty: 1, price: '', uom: "", saleType: "Goods at standard rate (default)", retailPrice: '', taxRate: user.settings?.taxRates?.salesTax || 18, furtherTax: 0, extraTax: user.settings?.taxRates?.extraTax || 0, fedPayable: 0, wht: 0, discount: 0, sroScheduleNo: "", sroItemSerialNo: "", isFromInventory: false, allowedUOMs: UOM_OPTIONS };
            const [lineItemForm, setLineItemForm] = useState(defaultLineItem);

            const [loading, setLoading] = useState(false); const [msg, setMsg] = useState(null); const [showReceipt, setShowReceipt] = useState(false); const [lastInv, setLastInv] = useState(null); const [hsCodes, setHsCodes] = useState([]); const [editingCustId, setEditingCustId] = useState(null); const [editingInvId, setEditingInvId] = useState(null);

                        {activeTab === 'history' && (
                            <Card className="p-0 overflow-hidden w-full">
                                <div className="flex justify-between items-center p-4 bg-gray-100 border-b border-gray-200"><div className="font-bold text-gray-900">Recent Invoices</div><div className="relative w-64"><input type="text" placeholder="Search..." className="px-3 py-2 border border-gray-300 rounded-lg outline-none w-full pl-8 text-sm" value={histSearch} onChange={e => setHistSearch(e.target.value)} /><span className="absolute left-2 top-2.5 text-gray-400"><Icons.Search size={14} /></span></div></div>
                                <table className="w-full text-left text-sm"><thead className="bg-gray-50 text-gray-500"><tr><th className="p-3">FBR Invoice #</th><th className="p-3">Date</th><th className="p-3">Customer</th><th className="p-3">NTN</th><th className="p-3 text-right">Total</th><th className="p-3 text-center">Action</th></tr></thead><tbody className="divide-y divide-gray-100">{filteredHistory.map(inv => (<tr key={inv.id} className="hover:bg-gray-50"><td className="p-3 text-xs font-bold">{inv.fbrInvoiceNumber}</td><td className="p-3">{inv.invoiceDate || inv.date}</td><td className="p-3">{inv.customerName}</td><td className="p-3">{inv.customerNTN}</td><td className="p-3 text-right">{formatCurrency(inv.total)}</td><td className="p-3 text-center"><div className="flex justify-center gap-2"><button onClick={() => { setLastInv(inv); setShowReceipt(true); }} className="text-gray-600 hover:text-black" title="Print"><Icons.Printer /></button><button onClick={() => downloadInvoice(inv)} className="text-gray-600 hover:text-black" title="Download"><Icons.Download /></button></div></td></tr>))}</tbody></table>
                            </Card>
                        )}

                        {activeTab === 'settings' && (
                            <div className="w-full"><Card className="p-8"><h2 className="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2"><Icons.Settings /> Client Configuration</h2>
                                <div className="space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 opacity-80 pointer-events-none"><Input label="Business Name" value={user?.settings?.businessName} readOnly /><Input label="Business Address" value={user?.settings?.address} readOnly /></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 opacity-80 pointer-events-none"><Input label="NTN" value={user?.settings?.ntn} readOnly /><Input label="STRN" value={user?.settings?.strn} readOnly /></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 opacity-80 pointer-events-none"><Input label="Sale Origination Province" value={user?.settings?.province} readOnly /><Input label="Active Environment" value={user?.settings?.integrationMode === 'production' ? 'Production' : 'Sandbox'} readOnly /></div>
                                    <div className="opacity-80 pointer-events-none"><label className="text-xs font-semibold text-gray-500 uppercase block mb-1">Company Logo</label>{user.settings?.logo ? <img src={user.settings.logo} className="h-10 mt-2 object-contain" /> : <p className="text-sm">No Logo Uploaded</p>}</div>
                                </div>
                                <div className="text-center mt-8 text-sm text-gray-500 border-t pt-4">Contact Administrator to update details. Invoices are locked to the FBR Standard format.</div>
                            </Card></div>
                        )}
                    </main >
                    {showReceipt && lastInv && <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">{renderInvoiceTemplate()}</div>}
                </div >
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>
</html>
