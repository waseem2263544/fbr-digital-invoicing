                                                            <td className="text-gray-500 hs-col">{item.hsCode?.split(' - ')[0]}</td>
                                                            <td className="text-gray-500">{item.saleType}</td>
                                                            <td className="font-medium text-gray-900">{q} <span className="text-gray-500 font-normal">{item.uom}</span></td>
                                                            <td>{formatCurrency(p)}</td>
                                                            {showRetailFed && <td>{isRet ? formatCurrency(r) : '-'}</td>}
                                                            <td>{item.taxRate}%</td>
                                                            <td className="font-medium text-gray-900">{formatCurrency(stAmt)}</td>
                                                            {showRetailFed && <td>{isRet ? formatCurrency(exAmt) : '-'}</td>}
                                                            <td>{formatCurrency(furAmt)}</td>
                                                            {showRetailFed && <td>{isRet ? formatCurrency(fedAmt) : '-'}</td>}
                                                            <td>{formatCurrency(item.wht)}</td>
                                                            <td className="text-gray-400">{item.sroScheduleNo || '-'}/{item.sroItemSerialNo || '-'}</td>
                                                            <td className="text-center">
                                                                <div className="flex justify-center gap-3">
                                                                    <button onClick={() => setLineItemForm(item)} className="text-gray-400 hover:text-black transition-colors"><Icons.Edit size={16} /></button>
                                                                    <button onClick={() => setInvoice(p => ({ ...p, items: p.items.filter(i => i.id !== item.id) }))} className="text-red-300 hover:text-red-600 transition-colors"><Icons.Trash2 size={16} /></button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="p-6 bg-gray-50 flex justify-end rounded-b-2xl border-t border-gray-100">
                                        <div className="flex gap-10 text-right">
                                            <div><div className="text-gray-400 text-[11px] font-bold uppercase tracking-wider mb-1">Subtotal</div><div className="font-semibold text-gray-700">{formatCurrency(totals.subtotal)}</div></div>
                                            <div><div className="text-gray-400 text-[11px] font-bold uppercase tracking-wider mb-1">Sales Tax</div><div className="font-semibold text-gray-900">{formatCurrency(totals.gst)}</div></div>
                                            {showRetailFed && <div><div className="text-gray-400 text-[11px] font-bold uppercase tracking-wider mb-1">Extra Tax</div><div className="font-semibold text-gray-900">{formatCurrency(totals.extra)}</div></div>}
                                            <div><div className="text-gray-400 text-[11px] font-bold uppercase tracking-wider mb-1">Further Tax</div><div className="font-semibold text-gray-900">{formatCurrency(totals.further)}</div></div>
                                            {showRetailFed && <div><div className="text-gray-400 text-[11px] font-bold uppercase tracking-wider mb-1">FED</div><div className="font-semibold text-gray-900">{formatCurrency(totals.fed)}</div></div>}
                                            <div><div className="text-blue-400 text-[11px] font-bold uppercase tracking-wider mb-1">ST Withheld</div><div className="font-semibold text-blue-600">-{formatCurrency(totals.wht)}</div></div>
                                            <div className="pl-6 border-l border-gray-200"><div className="text-gray-900 text-[11px] font-bold uppercase tracking-wider mb-1">Grand Total</div><div className="font-bold text-2xl tracking-tight">{formatCurrency(totals.total)}</div></div>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-8 flex justify-end gap-4">
                                        <Button onClick={() => setLastInv({ ...invoice, ...totals, id: invoice.invoiceNumber }) || setShowReceipt(true)} variant="secondary" className="px-6"><Icons.Printer /> Print Preview</Button>
                                        {userCanEdit && (
                                            <>
                                                <Button onClick={() => callFbrApi(true)} variant="secondary" disabled={loading || invoice.items.length === 0} className="px-6"><Icons.ShieldCheck /> Validate Only</Button>
                                                <Button onClick={() => callFbrApi(false)} disabled={loading || invoice.items.length === 0} className="px-8"><Icons.Save /> Submit to FBR</Button>
                                            </>
                                        )}
                                    </div>
                                </Card>
                            </div>
                        )}

                        {activeTab === 'inventory' && (
                            <div className="w-full animate-fade-in" style={{animationDelay: '0.1s'}}>
                                {userCanEdit && (
                                    <Card className="p-8 mb-8">
                                        <h2 className="text-2xl font-bold text-gray-900 tracking-tight mb-6 flex items-center gap-2"><Icons.Box /> {editingInvId ? 'Edit Item' : 'Add Item'}</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-12 gap-6 items-end bg-white">
                                            {/* Row 1 */}
                                            <div className="md:col-span-4"><Input label="Product Name" value={newItem.name} onChange={e => setNewItem({ ...newItem, name: e.target.value })} /></div>
                                            <div className="md:col-span-5"><SearchableDropdown label="HS Code" value={newItem.hsCode} options={hsCodes.map(h => h.val ? h.val : h)} onChange={val => { const code = val.includes(" - ") ? val.split(" - ")[0] : val; const matchingObj = hsCodes.find(h => h.val === val); setNewItem(prev => ({ ...prev, hsCode: val, name: (!prev.name && matchingObj?.desc) ? matchingObj.desc : prev.name })); fetchAllowedUOMs(code).then(uoms => { setInvUomOptions(uoms); if (uoms && uoms.length === 1) { setNewItem(prev => ({ ...prev, uom: uoms[0] })); } }); }} placeholder="Search HS Code" strict={false} /></div>
                                            <div className="md:col-span-3"><SearchableDropdown label="UoM" value={newItem.uom} options={invUomOptions} onChange={val => setNewItem({ ...newItem, uom: val })} status={invUomStatus} /></div>
                                            
                                            {/* Row 2 */}
                                            <div className="md:col-span-6"><SearchableDropdown label="Sales Type" value={newItem.saleType} options={SALE_TYPES} onChange={val => setNewItem({ ...newItem, saleType: val })} /></div>
                                            <div className="md:col-span-2"><Input label="Price" type="number" value={newItem.price} onChange={e => setNewItem({ ...newItem, price: e.target.value })} /></div>
                                            <div className="md:col-span-2"><Input label="S.Tax %" type="number" value={newItem.taxRate} onChange={e => setNewItem({ ...newItem, taxRate: e.target.value })} /></div>
                                            <div className="md:col-span-2"><Input label="Fur.Tax %" type="number" value={newItem.furtherTax} onChange={e => setNewItem({ ...newItem, furtherTax: e.target.value })} /></div>
                                            
                                            {/* Row 3 (Conditional) */}
                                            {showRetailFed && (
                                                <div className="md:col-span-12 grid grid-cols-1 md:grid-cols-12 gap-6 bg-gray-50 p-5 rounded-2xl border border-gray-100 mt-2">
                                                    <div className="md:col-span-4"><Input label="Retail Price" type="number" value={newItem.retailPrice} onChange={e => setNewItem({ ...newItem, retailPrice: e.target.value })} className="bg-white" /></div>
                                                    <div className="md:col-span-4"><Input label="Extra Tax %" type="number" value={newItem.extraTax} onChange={e => setNewItem({ ...newItem, extraTax: e.target.value })} className="bg-white" /></div>
                                                    <div className="md:col-span-4"><Input label="FED Amount" type="number" value={newItem.fedPayable} onChange={e => setNewItem({ ...newItem, fedPayable: e.target.value })} className="bg-white" /></div>
                                                </div>
                                            )}

                                            {/* Row 4 */}
                                            <div className="md:col-span-4"><Input label="SRO Schedule No" value={newItem.sroScheduleNo} onChange={e => setNewItem({ ...newItem, sroScheduleNo: e.target.value })} /></div>
                                            <div className="md:col-span-4"><Input label="SRO Serial No" value={newItem.sroItemSerialNo} onChange={e => setNewItem({ ...newItem, sroItemSerialNo: e.target.value })} /></div>
                                            <div className="md:col-span-4"><Input label="ST WHT Amount" type="number" value={newItem.wht} onChange={e => setNewItem({ ...newItem, wht: e.target.value })} /></div>
                                            
                                            <div className="md:col-span-12 flex justify-end gap-3 mt-6 border-t border-gray-100 pt-6">
                                                {editingInvId && <Button onClick={() => { setEditingInvId(null); setNewItem({ name: '', hsCode: '', price: '', uom: "", saleType: "Goods at standard rate (default)", retailPrice: 0, taxRate: user.settings.taxRates?.salesTax || 18, furtherTax: 0, extraTax: user.settings.taxRates?.extraTax || 0, fedPayable: 0, wht: 0, discount: 0, sroScheduleNo: "", sroItemSerialNo: "" }); }} variant="secondary" className="px-6">Cancel</Button>}
                                                <Button onClick={() => { if (editingInvId) { saveUser({ inventory: (user.inventory || []).map(i => i.id === editingInvId ? { ...i, ...newItem } : i) }); setEditingInvId(null); setNewItem({ name: '', hsCode: '', price: '', uom: "", saleType: "Goods at standard rate (default)", retailPrice: 0, taxRate: user.settings.taxRates?.salesTax || 18, furtherTax: 0, extraTax: user.settings.taxRates?.extraTax || 0, fedPayable: 0, wht: 0, discount: 0, sroScheduleNo: "", sroItemSerialNo: "" }); } else addInventory(); }} className="px-8"><Icons.Save size={16} /> {editingInvId ? 'Update Item' : 'Save Item'}</Button>
                                            </div>
                                        </div>
                                    </Card>
                                )}

                                {/* FULL VISUAL INVENTORY TABLE */}
                                <Card className="p-0 overflow-hidden">
                                    <div className="flex justify-between items-center p-6 bg-white border-b border-gray-100">
                                        <div className="font-bold text-gray-900 tracking-tight">Inventory Items</div>
                                        <div className="relative w-72">
                                            <input type="text" placeholder="Search inventory..." className="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-200 transition-all" value={invSearch} onChange={e => setInvSearch(e.target.value)} />
                                            <span className="absolute left-3 top-2.5 text-gray-400"><Icons.Search size={16} /></span>
                                        </div>
                                    </div>
                                    <div className="table-container">
                                        <table className="fbr-table text-left text-sm w-full">
                                            <thead>
                                                <tr>
                                                    <th>Name</th><th>HS Code</th><th>Type</th><th>UoM</th><th>Price</th>
                                                    {showRetailFed && <th className="text-amber-600">Ret.Price</th>}
                                                    <th>S.Tax%</th><th>Fur.Tax%</th>
                                                    {showRetailFed && <th className="text-amber-600">Ex.Tax%</th>}
                                                    {showRetailFed && <th className="text-amber-600">FED</th>}
                                                    <th>WHT</th><th>SRO Sch/Ser</th>
                                                    {userCanEdit && <th className="text-center">Action</th>}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {filteredInventory.length === 0 ? <tr><td colSpan="15" className="p-12 text-center text-gray-400 italic">No items added to inventory.</td></tr> : filteredInventory.map(i => (
                                                    <tr key={i.id}>
                                                        <td className="font-semibold text-gray-900">{i.name}</td>
                                                        <td className="text-gray-500">{i.hsCode?.split(' - ')[0]}</td>
                                                        <td className="text-gray-500">{i.saleType}</td>
                                                        <td className="font-medium">{i.uom}</td>
                                                        <td>{formatCurrency(i.price)}</td>
                                                        {showRetailFed && <td className="font-semibold text-amber-700">{formatCurrency(i.retailPrice)}</td>}
                                                        <td>{i.taxRate}%</td>
                                                        <td>{i.furtherTax}%</td>
                                                        {showRetailFed && <td className="text-amber-700">{i.extraTax}%</td>}
                                                        {showRetailFed && <td className="text-amber-700">{i.fedPayable}</td>}
                                                        <td>{i.wht}</td>
                                                        <td className="text-gray-400">{i.sroScheduleNo || '-'}/{i.sroItemSerialNo || '-'}</td>
                                                        {userCanEdit && <td className="text-center">
                                                            <div className="flex justify-center gap-3">
                                                                <button onClick={() => { setNewItem(i); setEditingInvId(i.id); }} className="text-gray-400 hover:text-black transition-colors"><Icons.Edit size={16}/></button>
                                                                <button onClick={() => deleteInventory(i.id)} className="text-red-300 hover:text-red-600 transition-colors"><Icons.Trash2 size={16}/></button>
                                                            </div>
                                                        </td>}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </Card>
                            </div >
                        )}

                        {activeTab === 'customers' && (
                            <div className="w-full animate-fade-in" style={{animationDelay: '0.1s'}}>
                                {userCanEdit && (
                                    <Card className="p-8 mb-8">
                                        <h2 className="text-2xl font-bold tracking-tight text-gray-900 mb-6 flex items-center gap-2"><Icons.Users /> {editingCustId ? 'Edit Customer' : 'Add Customer'}</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-12 gap-6 items-end">
                                            <div className="md:col-span-3"><Input label="Customer Name" value={newCust.name} onChange={e => setNewCust({ ...newCust, name: e.target.value })} /></div>
                                            <div className="md:col-span-2 relative"><Input label="NTN" value={newCust.ntn} onChange={e => setNewCust({ ...newCust, ntn: e.target.value })} /><button onClick={() => checkCustomerStatus(newCust.ntn)} className="absolute right-0 top-0 text-[10px] font-bold uppercase tracking-wider bg-gray-900 text-white px-3 py-1.5 rounded-lg hover:bg-black mt-[1.25rem] mr-1">Verify</button></div>
                                            <div className="md:col-span-2"><SearchableDropdown label="Reg Type" value={newCust.regType || 'Unregistered'} options={['Unregistered', 'Registered']} onChange={val => setNewCust({ ...newCust, regType: val })} strict={true} /></div>
                                            <div className="md:col-span-2"><SearchableDropdown label="Destination" value={newCust.destination} options={dynamicProvinces} onChange={val => setNewCust({ ...newCust, destination: val })} /></div>
                                            <div className="md:col-span-3 flex gap-3 items-end">
                                                <div className="flex-1"><Input label="Address" value={newCust.address} onChange={e => setNewCust({ ...newCust, address: e.target.value })} /></div>
                                                <Button onClick={addCustomer} className="px-6">{editingCustId ? 'Update' : 'Add'}</Button>
                                            </div>
                                        </div>
                                    </Card>
                                )}
                                <Card className="p-0 overflow-hidden">
                                    <div className="flex justify-between items-center p-6 bg-white border-b border-gray-100">
                                        <div className="font-bold text-gray-900 tracking-tight">Customer Directory</div>
                                        <div className="relative w-72">
                                            <input type="text" placeholder="Search customers..." className="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-200 transition-all" value={custSearch} onChange={e => setCustSearch(e.target.value)} />
                                            <span className="absolute left-3 top-2.5 text-gray-400"><Icons.Search size={16} /></span>
                                        </div>
                                    </div>
                                    <div className="table-container">
                                        <table className="fbr-table text-left text-sm w-full">
                                            <thead><tr><th>Name</th><th>NTN</th><th>Reg Type</th><th>Destination</th><th>Address</th>{userCanEdit && <th className="text-right">Action</th>}</tr></thead>
                                            <tbody>{filteredCustomers.length === 0 ? <tr><td colSpan="10" className="p-12 text-center text-gray-400 italic">No customers found.</td></tr> : filteredCustomers.map(c => (
                                                <tr key={c.id}>
                                                    <td className="font-semibold text-gray-900">{c.name}</td>
                                                    <td className="text-gray-500 font-mono">{c.ntn}</td>
                                                    <td><span className={`px-2 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider ${c.regType === 'Registered' ? 'bg-emerald-100 text-emerald-800' : 'bg-gray-100 text-gray-600'}`}>{c.regType || 'Unregistered'}</span></td>
                                                    <td className="text-gray-700">{c.destination}</td>
                                                    <td className="text-gray-400 truncate max-w-[200px]">{c.address}</td>
                                                    {userCanEdit && <td className="text-right">
                                                        <div className="flex justify-end gap-3">
                                                            <button onClick={() => editCustomer(c)} className="text-gray-400 hover:text-black transition-colors"><Icons.Edit size={16} /></button>
                                                            <button onClick={() => deleteCustomer(c.id)} className="text-red-300 hover:text-red-600 transition-colors"><Icons.Trash2 size={16} /></button>
                                                        </div>
                                                    </td>}
                                                </tr>
                                            ))}</tbody>
                                        </table>
                                    </div>
                                </Card>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <Card className="p-0 overflow-hidden w-full animate-fade-in" style={{animationDelay: '0.1s'}}>
                                <div className="flex justify-between items-center p-6 bg-white border-b border-gray-100">
                                    <div className="font-bold text-gray-900 tracking-tight">Invoice History</div>
                                    <div className="relative w-72">
                                        <input type="text" placeholder="Search by FBR # or Customer..." className="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-200 transition-all" value={histSearch} onChange={e => setHistSearch(e.target.value)} />
                                        <span className="absolute left-3 top-2.5 text-gray-400"><Icons.Search size={16} /></span>
                                    </div>
                                </div>
                                <div className="table-container">
                                    <table className="w-full text-left text-sm fbr-table">
                                        <thead><tr><th>FBR Invoice #</th><th>Date</th><th>Customer</th><th>NTN</th><th className="text-right">Subtotal</th><th className="text-right">Sales Tax</th><th className="text-right">FED</th><th className="text-right">Fur.Tax</th><th className="text-right">WHT</th><th className="text-right">Grand Total</th><th className="text-center">Action</th></tr></thead>
                                        <tbody>
                                            {filteredHistory.length === 0 ? <tr><td colSpan="12" className="p-12 text-center text-gray-400 italic">No invoices submitted yet.</td></tr> : filteredHistory.map(inv => (
                                                <tr key={inv.id}>
                                                    <td className="font-mono text-xs font-bold text-blue-600">{inv.fbrInvoiceNumber}</td>
                                                    <td className="text-gray-500 text-xs">{inv.invoiceDate || inv.date}</td>
                                                    <td className="font-semibold text-gray-900 text-xs">{inv.customerName}</td>
                                                    <td className="text-gray-400 font-mono text-xs">{inv.customerNTN}</td>
                                                    <td className="text-right text-gray-500 text-xs">{formatCurrency(inv.subtotal)}</td>
                                                    <td className="text-right text-gray-500 text-xs">{formatCurrency(inv.gst)}</td>
                                                    <td className="text-right text-gray-500 text-xs">{formatCurrency(inv.fed)}</td>
                                                    <td className="text-right text-gray-500 text-xs">{formatCurrency(inv.further)}</td>
                                                    <td className="text-right text-blue-500 text-xs">{formatCurrency(inv.wht)}</td>
                                                    <td className="text-right font-bold text-gray-900">{formatCurrency(inv.total)}</td>
                                                    <td className="text-center">
                                                        <div className="flex justify-center gap-3">
                                                            <button onClick={() => { setLastInv(inv); setShowReceipt(true); }} className="text-gray-400 hover:text-black transition-colors" title="Print"><Icons.Printer size={16} /></button>
                                                            <button onClick={() => downloadInvoice(inv)} className="text-gray-400 hover:text-blue-600 transition-colors" title="Download JSON"><Icons.Download size={16} /></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        )}

                        {activeTab === 'settings' && (
                            <div className="w-full max-w-4xl mx-auto animate-fade-in" style={{animationDelay: '0.1s'}}>
                                <Card className="p-10">
                                    <h2 className="text-3xl font-bold text-gray-900 tracking-tight mb-8">Business Settings</h2>
                                    <div className="space-y-8">
                                        <div className="bg-gray-50 p-6 rounded-2xl border border-gray-100">
                                            <h3 className="font-bold text-sm text-gray-400 uppercase tracking-wider mb-6">Contact Information</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <Input label="Contact Phone" value={user?.settings?.phone || ''} onChange={e => { const newU = {...user, settings: {...user.settings, phone: e.target.value}}; setUser(newU); saveUser({ settings: newU.settings }); }} className="bg-white" />
                                                <Input label="Contact Email" value={user?.settings?.email || ''} onChange={e => { const newU = {...user, settings: {...user.settings, email: e.target.value}}; setUser(newU); saveUser({ settings: newU.settings }); }} />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 opacity-80 pointer-events-none"><Input label="Business Name" value={user?.settings?.businessName} readOnly /><Input label="Business Address" value={user?.settings?.address} readOnly /></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 opacity-80 pointer-events-none"><Input label="NTN" value={user?.settings?.ntn} readOnly /><Input label="STRN" value={user?.settings?.strn} readOnly /></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 opacity-80 pointer-events-none"><Input label="Sale Origination Province" value={user?.settings?.province} readOnly /><Input label="Active Environment" value={user?.settings?.integrationMode === 'production' ? 'Production' : 'Sandbox'} readOnly /></div>
                                    <div className="opacity-80 pointer-events-none"><label className="text-xs font-semibold text-gray-500 uppercase block mb-1">Company Logo</label>{user.settings?.logo ? <img src={user.settings.logo} className="h-10 mt-2 object-contain" /> : <p className="text-sm">No Logo Uploaded</p>}</div>
                                </div>
                                <div className="text-center mt-8 text-sm text-gray-500 border-t pt-4">Contact Administrator to update locked details. Invoices are printed to FBR Standard format.</div>
                            </Card></div>
                        )}
                    </main >
                    {showReceipt && lastInv && <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">{renderInvoiceTemplate()}</div>}
                </div >
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>
</html>
