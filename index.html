                                        <div className="flex gap-10 text-right">
                                            <div><div className="text-gray-400 text-[11px] uppercase tracking-wider font-bold mb-1">Subtotal</div><div className="font-semibold text-lg">{formatCurrency(totals.subtotal)}</div></div>
                                            <div><div className="text-gray-400 text-[11px] uppercase tracking-wider font-bold mb-1">Sales Tax</div><div className="font-semibold text-lg">{formatCurrency(totals.gst)}</div></div>
                                            {showRetailFed && <div><div className="text-gray-400 text-[11px] uppercase tracking-wider font-bold mb-1">Extra Tax</div><div className="font-semibold text-lg">{formatCurrency(totals.extra)}</div></div>}
                                            <div><div className="text-gray-400 text-[11px] uppercase tracking-wider font-bold mb-1">Further Tax</div><div className="font-semibold text-lg">{formatCurrency(totals.further)}</div></div>
                                            {showRetailFed && <div><div className="text-gray-400 text-[11px] uppercase tracking-wider font-bold mb-1">FED</div><div className="font-semibold text-lg">{formatCurrency(totals.fed)}</div></div>}
                                            <div><div className="text-blue-500 text-[11px] uppercase tracking-wider font-bold mb-1">ST Withheld</div><div className="font-bold text-lg text-blue-600">-{formatCurrency(totals.wht)}</div></div>
                                            <div className="pl-6 border-l border-gray-300"><div className="text-gray-900 text-[11px] uppercase tracking-wider font-bold mb-1">Grand Total</div><div className="font-bold text-3xl tracking-tight">{formatCurrency(totals.total)}</div></div>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-8 flex justify-end gap-4 border-t border-gray-100 pt-6">
                                        <Button onClick={() => setLastInv({ ...invoice, ...totals, id: invoice.invoiceNumber }) || setShowReceipt(true)} variant="secondary" className="px-6 shadow-sm"><Icons.Printer size={18}/> Print Preview</Button>
                                        {userCanEdit && (
                                            <>
                                                <Button onClick={() => callFbrApi(true)} variant="secondary" disabled={loading || invoice.items.length === 0} className="px-6 shadow-sm"><Icons.ShieldCheck size={18}/> Validate</Button>
                                                <Button onClick={() => callFbrApi(false)} disabled={loading || invoice.items.length === 0} className="px-8 shadow-sm"><Icons.Save size={18}/> Submit to FBR</Button>
                                            </>
                                        )}
                                    </div>
                                </Card>
                            </div>
                        )}

                        {activeTab === 'inventory' && (
                            <div className="w-full animate-fade-in">
                                {userCanEdit && (
                                    <Card className="p-8 mb-8">
                                        <div className="flex justify-between items-center mb-6 border-b border-gray-100 pb-4"><h2 className="text-2xl font-bold text-gray-900 flex items-center gap-3 tracking-tight"><div className="bg-blue-50 text-blue-600 p-2 rounded-lg"><Icons.Box size={24} /></div> {editingInvId ? 'Edit Product' : 'Add Product'}</h2></div>
                                        <div className="grid grid-cols-1 md:grid-cols-12 gap-5 items-end">
                                            <div className="md:col-span-4"><Input label="Product Name" value={newItem.name} onChange={e => setNewItem({ ...newItem, name: e.target.value })} /></div>
                                            <div className="md:col-span-5"><SearchableDropdown label="HS Code" value={newItem.hsCode} options={hsCodes.map(h => h.val ? h.val : h)} onChange={val => { const code = val.includes(" - ") ? val.split(" - ")[0] : val; const matchingObj = hsCodes.find(h => h.val === val); setNewItem(prev => ({ ...prev, hsCode: val, name: (!prev.name && matchingObj?.desc) ? matchingObj.desc : prev.name })); fetchAllowedUOMs(code).then(uoms => { setInvUomOptions(uoms); if (uoms && uoms.length === 1) { setNewItem(prev => ({ ...prev, uom: uoms[0] })); } }); }} placeholder="Search HS Code" strict={false} /></div>
                                            <div className="md:col-span-3"><SearchableDropdown label="UoM" value={newItem.uom} options={invUomOptions} onChange={val => setNewItem({ ...newItem, uom: val })} status={invUomStatus} /></div>
                                            
                                            <div className="md:col-span-6"><SearchableDropdown label="Sales Type" value={newItem.saleType} options={SALE_TYPES} onChange={val => setNewItem({ ...newItem, saleType: val })} /></div>
                                            <div className="md:col-span-2"><Input label="Price" type="number" value={newItem.price} onChange={e => setNewItem({ ...newItem, price: e.target.value })} /></div>
                                            <div className="md:col-span-2"><Input label="S.Tax %" type="number" value={newItem.taxRate} onChange={e => setNewItem({ ...newItem, taxRate: e.target.value })} /></div>
                                            <div className="md:col-span-2"><Input label="Fur.Tax %" type="number" value={newItem.furtherTax} onChange={e => setNewItem({ ...newItem, furtherTax: e.target.value })} /></div>
                                            
                                            {showRetailFed && (
                                                <div className="md:col-span-12 grid grid-cols-1 md:grid-cols-12 gap-5 bg-yellow-50/50 p-5 rounded-xl border border-yellow-100">
                                                    <div className="md:col-span-4"><Input label="Retail Price" type="number" value={newItem.retailPrice} onChange={e => setNewItem({ ...newItem, retailPrice: e.target.value })} /></div>
                                                    <div className="md:col-span-4"><Input label="Extra Tax %" type="number" value={newItem.extraTax} onChange={e => setNewItem({ ...newItem, extraTax: e.target.value })} /></div>
                                                    <div className="md:col-span-4"><Input label="FED Amount" type="number" value={newItem.fedPayable} onChange={e => setNewItem({ ...newItem, fedPayable: e.target.value })} /></div>
                                                </div>
                                            )}

                                            <div className="md:col-span-4"><Input label="SRO Schedule No" value={newItem.sroScheduleNo} onChange={e => setNewItem({ ...newItem, sroScheduleNo: e.target.value })} /></div>
                                            <div className="md:col-span-4"><Input label="SRO Serial No" value={newItem.sroItemSerialNo} onChange={e => setNewItem({ ...newItem, sroItemSerialNo: e.target.value })} /></div>
                                            <div className="md:col-span-4"><Input label="ST WHT Amount" type="number" value={newItem.wht} onChange={e => setNewItem({ ...newItem, wht: e.target.value })} /></div>
                                            
                                            <div className="md:col-span-12 flex justify-end gap-3 mt-4 border-t border-gray-100 pt-6">
                                                {editingInvId && <Button onClick={() => { setEditingInvId(null); setNewItem({ name: '', hsCode: '', price: '', uom: "", saleType: "Goods at standard rate (default)", retailPrice: 0, taxRate: user.settings.taxRates?.salesTax || 18, furtherTax: 0, extraTax: user.settings.taxRates?.extraTax || 0, fedPayable: 0, wht: 0, discount: 0, sroScheduleNo: "", sroItemSerialNo: "" }); }} variant="secondary" className="px-6 shadow-sm">Cancel</Button>}
                                                <Button onClick={() => { if (editingInvId) { saveUser({ inventory: (user.inventory || []).map(i => i.id === editingInvId ? { ...i, ...newItem } : i) }); setEditingInvId(null); setNewItem({ name: '', hsCode: '', price: '', uom: "", saleType: "Goods at standard rate (default)", retailPrice: 0, taxRate: user.settings.taxRates?.salesTax || 18, furtherTax: 0, extraTax: user.settings.taxRates?.extraTax || 0, fedPayable: 0, wht: 0, discount: 0, sroScheduleNo: "", sroItemSerialNo: "" }); } else addInventory(); }} className="px-8 shadow-sm"><Icons.Save size={18} /> {editingInvId ? 'Update Item' : 'Save Item'}</Button>
                                            </div>
                                        </div>
                                    </Card>
                                )}

                                <Card className="p-0 overflow-hidden shadow-sm">
                                    <div className="flex justify-between items-center p-6 border-b border-gray-100 bg-white"><div className="font-bold text-gray-900 text-lg">Product Inventory</div><div className="relative w-64"><input type="text" placeholder="Search..." className="px-4 py-2 border border-gray-200 rounded-lg outline-none w-full pl-10 text-sm focus:border-black transition-colors" value={invSearch} onChange={e => setInvSearch(e.target.value)} /><span className="absolute left-3 top-2.5 text-gray-400"><Icons.Search size={16} /></span></div></div>
                                    <div className="table-container">
                                        <table className="fbr-table text-left text-sm w-full">
                                            <thead className="bg-gray-50 text-gray-500 text-[11px] uppercase tracking-wider font-bold">
                                                <tr>
                                                    <th className="p-4 border-r border-gray-200">Product Name</th><th className="p-4">HS Code</th><th className="p-4">Type</th><th className="p-4">UoM</th><th className="p-4 text-right">Price</th>
                                                    {showRetailFed && <th className="p-4 text-right">Ret.Price</th>}
                                                    <th className="p-4 text-center">S.Tax%</th><th className="p-4 text-center">Fur.Tax%</th>
                                                    {showRetailFed && <th className="p-4 text-center">Ex.Tax%</th>}
                                                    {showRetailFed && <th className="p-4 text-right">FED</th>}
                                                    <th className="p-4 text-right">WHT</th><th className="p-4">SRO Sch/Ser</th>
                                                    {userCanEdit && <th className="p-4 text-center">Action</th>}
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {filteredInventory.length === 0 ? <tr><td colSpan="15" className="p-12 text-center text-gray-400 bg-white">No items added to inventory.</td></tr> : filteredInventory.map(i => (
                                                    <tr key={i.id} className="hover:bg-gray-50 transition-colors bg-white">
                                                        <td className="p-4 font-bold text-sm border-r border-gray-100">{i.name}</td>
                                                        <td className="p-4 text-xs text-gray-500">{i.hsCode?.split(' - ')[0]}</td>
                                                        <td className="p-4 text-xs text-gray-500">{i.saleType}</td>
                                                        <td className="p-4 text-sm font-medium">{i.uom}</td>
                                                        <td className="p-4 text-sm text-right">{formatCurrency(i.price)}</td>
                                                        {showRetailFed && <td className="p-4 text-sm font-medium text-gray-900 text-right">{formatCurrency(i.retailPrice)}</td>}
                                                        <td className="p-4 text-sm text-center">{i.taxRate}%</td>
                                                        <td className="p-4 text-sm text-center">{i.furtherTax}%</td>
                                                        {showRetailFed && <td className="p-4 text-sm text-center">{i.extraTax}%</td>}
                                                        {showRetailFed && <td className="p-4 text-sm text-right">{i.fedPayable}</td>}
                                                        <td className="p-4 text-sm text-right">{i.wht}</td>
                                                        <td className="p-4 text-xs text-gray-500">{i.sroScheduleNo || '-'}/{i.sroItemSerialNo || '-'}</td>
                                                        {userCanEdit && <td className="p-4 text-center">
                                                            <div className="flex justify-center gap-3">
                                                                <button onClick={() => { setNewItem(i); setEditingInvId(i.id); }} className="text-gray-400 hover:text-black transition-colors"><Icons.Edit size={18}/></button>
                                                                <button onClick={() => deleteInventory(i.id)} className="text-gray-400 hover:text-red-500 transition-colors"><Icons.Trash2 size={18}/></button>
                                                            </div>
                                                        </td>}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </Card>
                            </div >
                        )}

                        {activeTab === 'customers' && (
                            <div className="w-full animate-fade-in">
                                {userCanEdit && (
                                    <Card className="p-8 mb-8">
                                        <div className="flex justify-between items-center mb-6 border-b border-gray-100 pb-4"><h2 className="text-2xl font-bold text-gray-900 flex items-center gap-3 tracking-tight"><div className="bg-blue-50 text-blue-600 p-2 rounded-lg"><Icons.Users size={24} /></div> {editingCustId ? 'Edit Customer' : 'Add Customer'}</h2></div>
                                        <div className="grid grid-cols-1 md:grid-cols-12 gap-5 items-end">
                                            <div className="md:col-span-3"><Input label="Customer Name" value={newCust.name} onChange={e => setNewCust({ ...newCust, name: e.target.value })} /></div>
                                            <div className="md:col-span-2 relative"><Input label="NTN" value={newCust.ntn} onChange={e => setNewCust({ ...newCust, ntn: e.target.value })} /><button onClick={() => checkCustomerStatus(newCust.ntn)} className="absolute right-1 top-6 text-[10px] bg-gray-100 text-gray-700 px-3 py-1.5 rounded-md hover:bg-gray-200 font-bold tracking-wider transition-colors">Verify</button></div>
                                            <div className="md:col-span-2"><SearchableDropdown label="Reg Type" value={newCust.regType || 'Unregistered'} options={['Unregistered', 'Registered']} onChange={val => setNewCust({ ...newCust, regType: val })} strict={true} /></div>
                                            <div className="md:col-span-2"><SearchableDropdown label="Destination" value={newCust.destination} options={dynamicProvinces} onChange={val => setNewCust({ ...newCust, destination: val })} /></div>
                                            <div className="md:col-span-2"><Input label="Address" value={newCust.address} onChange={e => setNewCust({ ...newCust, address: e.target.value })} /></div>
                                            <div className="md:col-span-1"><Button onClick={addCustomer} className="w-full shadow-sm">{editingCustId ? 'Update' : 'Add'}</Button></div>
                                        </div>
                                    </Card>
                                )}
                                <Card className="p-0 overflow-hidden shadow-sm">
                                    <div className="flex justify-between items-center p-6 border-b border-gray-100 bg-white"><div className="font-bold text-gray-900 text-lg">Customer Directory</div><div className="relative w-64"><input type="text" placeholder="Search..." className="px-4 py-2 border border-gray-200 rounded-lg outline-none w-full pl-10 text-sm focus:border-black transition-colors" value={custSearch} onChange={e => setCustSearch(e.target.value)} /><span className="absolute left-3 top-2.5 text-gray-400"><Icons.Search size={16} /></span></div></div>
                                    <table className="w-full text-left text-sm"><thead className="bg-gray-50 text-gray-500 text-[11px] uppercase tracking-wider font-bold"><tr><th className="p-4">Name</th><th className="p-4">NTN</th><th className="p-4">Reg Type</th><th className="p-4">Destination</th><th className="p-4">Address</th>{userCanEdit && <th className="p-4 text-right">Action</th>}</tr></thead><tbody className="divide-y divide-gray-100">{filteredCustomers.map(c => (<tr key={c.id} className="hover:bg-gray-50 transition-colors bg-white"><td className="p-4 font-bold text-gray-900">{c.name}</td><td className="p-4 text-gray-500">{c.ntn}</td><td className="p-4"><span className={`px-2.5 py-1 rounded-md text-[10px] font-bold tracking-wider uppercase ${c.regType === 'Registered' ? 'bg-black text-white' : 'bg-gray-100 text-gray-600'}`}>{c.regType || 'Unregistered'}</span></td><td className="p-4 text-gray-700">{c.destination}</td><td className="p-4 text-gray-500">{c.address}</td>{userCanEdit && <td className="p-4 text-right"><div className="flex justify-end gap-3"><button onClick={() => editCustomer(c)} className="text-gray-400 hover:text-black transition-colors"><Icons.Edit size={18}/></button><button onClick={() => deleteCustomer(c.id)} className="text-gray-400 hover:text-red-500 transition-colors"><Icons.Trash2 size={18}/></button></div></td>}</tr>))}</tbody></table>
                                </Card>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <Card className="p-0 overflow-hidden w-full shadow-sm animate-fade-in">
                                <div className="flex justify-between items-center p-6 border-b border-gray-100 bg-white"><div className="font-bold text-gray-900 text-lg">Invoice History</div><div className="relative w-64"><input type="text" placeholder="Search..." className="px-4 py-2 border border-gray-200 rounded-lg outline-none w-full pl-10 text-sm focus:border-black transition-colors" value={histSearch} onChange={e => setHistSearch(e.target.value)} /><span className="absolute left-3 top-2.5 text-gray-400"><Icons.Search size={16} /></span></div></div>
                                <div className="table-container">
                                    <table className="w-full text-left text-sm fbr-table"><thead className="bg-black text-white uppercase text-xs tracking-wide"><tr><th className="p-3">FBR Invoice #</th><th className="p-3">Date</th><th className="p-3">Customer</th><th className="p-3">NTN</th><th className="p-3 text-right">Subtotal</th><th className="p-3 text-right">Sales Tax</th><th className="p-3 text-right">FED</th><th className="p-3 text-right">Fur.Tax</th><th className="p-3 text-right">WHT</th><th className="p-3 text-right">Grand Total</th><th className="p-3 text-center">Action</th></tr></thead><tbody className="divide-y divide-gray-100">{filteredHistory.map(inv => (<tr key={inv.id} className="hover:bg-gray-50 transition-colors bg-white"><td className="p-4 text-xs font-bold text-red-600 border-r border-gray-100">{inv.fbrInvoiceNumber}</td><td className="p-4 text-xs text-gray-500">{inv.invoiceDate || inv.date}</td><td className="p-4 text-sm font-bold text-gray-900">{inv.customerName}</td><td className="p-4 text-xs text-gray-500">{inv.customerNTN}</td><td className="p-4 text-sm text-right text-gray-600">{formatCurrency(inv.subtotal)}</td><td className="p-4 text-sm text-right text-gray-600">{formatCurrency(inv.gst)}</td><td className="p-4 text-sm text-right text-gray-600">{formatCurrency(inv.fed)}</td><td className="p-4 text-sm text-right text-gray-600">{formatCurrency(inv.further)}</td><td className="p-4 text-sm text-right text-blue-600">{formatCurrency(inv.wht)}</td><td className="p-4 text-lg text-right font-bold text-gray-900 tracking-tight">{formatCurrency(inv.total)}</td><td className="p-4 text-center"><div className="flex justify-center gap-3"><button onClick={() => { setLastInv(inv); setShowReceipt(true); }} className="text-gray-400 hover:text-black transition-colors" title="Print"><Icons.Printer size={18}/></button><button onClick={() => downloadInvoice(inv)} className="text-gray-400 hover:text-black transition-colors" title="Download JSON"><Icons.Download size={18}/></button></div></td></tr>))}</tbody></table>
                                </div>
                            </Card>
                        )}

                        {activeTab === 'settings' && (
                            <div className="w-full animate-fade-in"><Card className="p-10 shadow-sm">
                                <div className="flex justify-between items-center mb-8 border-b border-gray-100 pb-4"><h2 className="text-2xl font-bold text-gray-900 flex items-center gap-3 tracking-tight"><div className="bg-blue-50 text-blue-600 p-2 rounded-lg"><Icons.Settings size={24} /></div> Client Configuration</h2></div>
                                <div className="space-y-8">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 border-b border-gray-100 pb-8">
                                        <div>
                                            <h3 className="font-bold text-sm text-gray-900 uppercase tracking-wider mb-5">Contact Information</h3>
                                            <div className="space-y-5">
                                                <Input label="Contact Phone" value={user?.settings?.phone || ''} onChange={e => { const newU = {...user, settings: {...user.settings, phone: e.target.value}}; setUser(newU); saveUser({ settings: newU.settings }); }} placeholder="e.g. 0937848595" />
                                                <Input label="Contact Email" value={user?.settings?.email || ''} onChange={e => { const newU = {...user, settings: {...user.settings, email: e.target.value}}; setUser(newU); saveUser({ settings: newU.settings }); }} placeholder="e.g. info@business.com" />
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <h3 className="font-bold text-sm text-gray-900 uppercase tracking-wider mb-5 opacity-60">Locked Business Profile</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 opacity-60 pointer-events-none mb-5"><Input label="Business Name" value={user?.settings?.businessName} readOnly /><Input label="Business Address" value={user?.settings?.address} readOnly /></div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 opacity-60 pointer-events-none mb-5"><Input label="NTN" value={user?.settings?.ntn} readOnly /><Input label="STRN" value={user?.settings?.strn} readOnly /></div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 opacity-60 pointer-events-none mb-5"><Input label="Sale Origination Province" value={user?.settings?.province} readOnly /><Input label="Active Environment" value={user?.settings?.integrationMode === 'production' ? 'Production' : 'Sandbox'} readOnly /></div>
                                        <div className="opacity-60 pointer-events-none"><label className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider pl-1 block mb-2">Company Logo</label>{user.settings?.logo ? <img src={user.settings.logo} className="h-16 mt-2 object-contain" /> : <p className="text-sm">No Logo Uploaded</p>}</div>
                                    </div>
                                </div>
                                <div className="text-center mt-10 text-sm text-gray-400 font-medium">Contact Administrator to update locked details. Invoices are printed to FBR Standard format.</div>
                            </Card></div>
                        )}
                    </main >
                    {showReceipt && lastInv && <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">{renderInvoiceTemplate()}</div>}
                </div >
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>
</html>
