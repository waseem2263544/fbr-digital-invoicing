<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBR Invoice System | Fair Tax</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/localforage/dist/localforage.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fbfbfd; }
        @media print { body * { visibility: hidden; } #printable-area, #printable-area * { visibility: visible; } #printable-area { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; box-shadow: none !important; } .no-print { display: none !important; } }
        .standard-input { height: 2.75rem; width: 100%; border: 1px solid #e5e7eb; border-radius: 12px; padding: 0 1rem; font-size: 0.875rem; outline: none; background: #ffffff; transition: all 0.2s; }
        .standard-input:focus { border-color: #000000; box-shadow: 0 0 0 4px rgba(0,0,0,0.05); }
        #fbr-official-logo { -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }
        .fbr-table { width: 100%; min-width: 1000px; border-spacing: 0; }
        .fbr-table th, .fbr-table td { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; white-space: nowrap; }
        .hide-scrollbar::-webkit-scrollbar { height: 8px; }
        .hide-scrollbar::-webkit-scrollbar-thumb { background-color: #d1d5db; border-radius: 10px; }
        @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
        .animate-slide-down { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Component } = React;

        const SYSTEM_CONFIG = { BASE_URL: "https://gw.fbr.gov.pk", PATHS: { POST_INVOICE_SB: "/di_data/v1/di/postinvoicedata_sb", POST_INVOICE_PROD: "/di_data/v1/di/postinvoicedata", VALIDATE_INVOICE_SB: "/di_data/v1/di/validateinvoicedata_sb", VALIDATE_INVOICE_PROD: "/di_data/v1/di/validateinvoicedata", PROVINCES: "/pdi/v1/provinces", DOCTYPECODE: "/pdi/v1/doctypecode", SROITEMCODE: "/pdi/v1/sroitemcode", UOM: "/pdi/v1/uom", HS_UOM: "/pdi/v2/HS_UOM", ITEM_CODE: "/pdi/v1/itemdesccode", GET_REG_TYPE: "/dist/v1/Get_Reg_Type" } };
        const SALE_TYPES = [ "Goods at standard rate (default)", "Goods at reduced rate", "Goods at zero-rate", "Petroleum Products", "3rd Schedule Goods", "Services", "Exempt goods", "Non-Adjustable Supplies" ];
        const PROVINCES = [ "Punjab", "Sindh", "Khyber Pakhtunkhwa", "Balochistan", "Capital Territory", "FATA/PATA", "Gilgit Baltistan", "AJK" ];
        const SCENARIOS = [ "SN001", "SN002", "SN008", "SN009", "SN010", "SN025", "SN026", "SN027", "SN028" ];
        const FBR_ERRORS = { "0000": "Successful", "0001": "Invalid NTN" };

        const numberToWords = (num) => {
            const a = ["","One ","Two ","Three ","Four ","Five ","Six ","Seven ","Eight ","Nine ","Ten ","Eleven ","Twelve ","Thirteen ","Fourteen ","Fifteen ","Sixteen ","Seventeen ","Eighteen ","Nineteen "];
            const b = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
            const format = (n) => {
                if (n < 20) return a[n];
                if (n < 100) return b[Math.floor(n / 10)] + (n % 10 !== 0 ? " " + a[n % 10] : "");
                return a[Math.floor(n / 100)] + "Hundred " + (n % 100 !== 0 ? format(n % 100) : "");
            };
            return num === 0 ? "Zero" : format(Math.floor(num)).trim() + " Rupees Only";
        };

        const fbrFetch = async (url, options = {}) => {
            const sessionToken = sessionStorage.getItem('fbr_token');
            const res = await fetch('https://app.tallied.pk/api/fbr/proxy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
                body: JSON.stringify({ endpoint: url.replace(SYSTEM_CONFIG.BASE_URL, ''), method: options.method || 'GET', payload: options.body ? JSON.parse(options.body) : null })
            });
            const proxyData = await res.json();
            return { ok: proxyData.ok, status: proxyData.status, json: async () => proxyData.data };
        };

        const IconBase = ({ size = 20, children, ...props }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>{children}</svg> );
        const Icons = {
            FileText: (p) => <IconBase {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /></IconBase>,
            Settings: (p) => <IconBase {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></IconBase>,
            Plus: (p) => <IconBase {...p}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></IconBase>,
            Trash2: (p) => <IconBase {...p}><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></IconBase>,
            Save: (p) => <IconBase {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></IconBase>,
            Printer: (p) => <IconBase {...p}><polyline points="6 9 6 0 18 0 18 9" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><rect x="6" y="14" width="12" height="8" /></IconBase>,
            CheckCircle: (p) => <IconBase {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></IconBase>,
            AlertCircle: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></IconBase>,
            X: (p) => <IconBase {...p}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></IconBase>,
            LogOut: (p) => <IconBase {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></IconBase>,
            ShoppingCart: (p) => <IconBase {...p}><circle cx="9" cy="21" r="1" /><circle cx="20" cy="21" r="1" /><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" /></IconBase>,
            Edit: (p) => <IconBase {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></IconBase>
        };

        const Input = ({ label, value, onChange, type = "text", placeholder = "", readOnly = false }) => (
            <div className="w-full flex flex-col gap-1">
                {label && <label className="text-[10px] font-bold text-gray-400 uppercase tracking-wider ml-1">{label}</label>}
                <input type={type} value={value} onChange={onChange} readOnly={readOnly} placeholder={placeholder} className="standard-input" />
            </div>
        );

        const SearchableDropdown = ({ label, value, onChange, options = [], strict = true, placeholder }) => {
            const [show, setShow] = useState(false);
            const [filter, setFilter] = useState("");
            const ref = useRef();
            useEffect(() => { const hide = (e) => { if (ref.current && !ref.current.contains(e.target)) setShow(false); }; document.addEventListener("mousedown", hide); return () => document.removeEventListener("mousedown", hide); }, []);
            const filtered = options.filter(o => String(o).toLowerCase().includes(filter.toLowerCase()));
            return (
                <div className="relative w-full" ref={ref}>
                    {label && <label className="text-[10px] font-bold text-gray-400 uppercase mb-1 block pl-1">{label}</label>}
                    <input type="text" className="standard-input" value={value} readOnly={strict} placeholder={placeholder} onClick={() => setShow(true)} onChange={(e) => { if(!strict) onChange(e.target.value); setFilter(e.target.value); }} />
                    {show && (
                        <div className="absolute top-full left-0 right-0 mt-1 bg-white border border-gray-200 rounded-xl shadow-xl z-50 max-h-48 overflow-y-auto">
                            <div className="p-2 border-b"><input className="w-full text-sm p-1 outline-none" placeholder="Search..." autoFocus onChange={e => setFilter(e.target.value)} /></div>
                            {filtered.map((o, i) => <div key={i} className="px-4 py-2 hover:bg-gray-50 cursor-pointer text-sm" onClick={() => { onChange(o); setShow(false); setFilter(""); }}>{o}</div>)}
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState("invoice");
            const [loading, setLoading] = useState(false);
            const [msg, setMsg] = useState(null);
            const [showReceipt, setShowReceipt] = useState(false);
            const [lastInv, setLastInv] = useState(null);

            useEffect(() => {
                const load = async () => {
                    const session = await window.localforage.getItem('fbr_session') || JSON.parse(sessionStorage.getItem('fbr_session'));
                    if (session) setUser(session);
                };
                load();
            }, []);

            const saveUser = async (newData) => {
                const u = { ...user, ...newData }; setUser(u);
                await window.localforage.setItem('fbr_session', u);
                sessionStorage.setItem('fbr_session', JSON.stringify(u));
                await fetch('https://app.tallied.pk/api/sync', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionStorage.getItem('fbr_token')}` }, body: JSON.stringify({ user: u }) });
            };

            if (!user) return <LoginScreen onLogin={(u) => { setUser(u); sessionStorage.setItem('fbr_session', JSON.stringify(u)); }} />;

            return (
                <div className="min-h-screen bg-gray-50 pb-10 relative">
                    {/* GLOBAL CLICK-TO-DISMISS NOTIFICATION OVERLAY */}
                    {msg && (
                        <div className="fixed inset-0 z-[10000]" onClick={() => setMsg(null)}>
                            <div className="absolute top-6 left-1/2 transform -translate-x-1/2 pointer-events-auto animate-slide-down">
                                <div className={`px-6 py-4 rounded-2xl border shadow-2xl font-medium flex items-center gap-3 cursor-pointer ${msg.type === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-green-50 border-green-200 text-green-800'}`}>
                                    {msg.type === 'error' ? <Icons.AlertCircle/> : <Icons.CheckCircle/>}
                                    {msg.text}
                                    <span className="ml-6 opacity-40 text-[10px] uppercase tracking-widest border-l border-current pl-4">Click anywhere to dismiss</span>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="bg-black text-white px-6 py-4 flex justify-between items-center shadow-lg sticky top-0 z-40">
                        <div className="font-bold text-lg flex items-center gap-3"><Icons.FileText /> {user.settings?.businessName}</div>
                        <div className="flex bg-white/10 p-1 rounded-xl">
                            {["invoice", "inventory", "customers", "history", "settings"].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`px-4 py-1.5 rounded-lg text-sm transition-all capitalize ${activeTab === t ? 'bg-white text-black font-bold' : 'text-gray-300 hover:text-white'}`}>{t}</button>
                            ))}
                        </div>
                        <button onClick={() => { sessionStorage.clear(); window.location.reload(); }} className="text-gray-400 hover:text-red-400 flex items-center gap-2"><Icons.LogOut size={16}/> Logout</button>
                    </nav>

                    <main className="max-w-[1400px] mx-auto p-6">
                        <ClientDashboard 
                            user={user} 
                            activeTab={activeTab} 
                            saveUser={saveUser} 
                            setMsg={setMsg} 
                            loading={loading} 
                            setLoading={setLoading}
                            setLastInv={setLastInv}
                            setShowReceipt={setShowReceipt}
                        />
                    </main>

                    {showReceipt && lastInv && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <ReceiptModal inv={lastInv} user={user} onClose={() => setShowReceipt(false)} />
                        </div>
                    )}
                </div>
            );
        }

        const LoginScreen = ({ onLogin }) => {
            const [form, setForm] = useState({ username: '', password: '' });
            const handle = async () => {
                const res = await fetch('https://app.tallied.pk/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) });
                const data = await res.json();
                if (res.ok) { sessionStorage.setItem('fbr_token', data.token); onLogin(data.user); } else alert("Invalid Login");
            };
            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                    <div className="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
                        <h1 className="text-2xl font-bold mb-8">FBR Portal Login</h1>
                        <div className="space-y-4">
                            <input className="standard-input" placeholder="Username" onChange={e => setForm({...form, username: e.target.value})} />
                            <input className="standard-input" type="password" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} />
                            <button className="w-full bg-black text-white py-3.5 rounded-2xl font-bold" onClick={handle}>Sign In</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ClientDashboard = (props) => {
            const { user, activeTab, saveUser, setMsg, loading, setLoading, setLastInv, setShowReceipt } = props;

            if (activeTab === 'history') return <HistoryTab user={user} setLastInv={setLastInv} setShowReceipt={setShowReceipt} />;
            if (activeTab === 'inventory') return <InventoryTab user={user} saveUser={saveUser} />;
            if (activeTab === 'customers') return <CustomersTab user={user} saveUser={saveUser} />;
            if (activeTab === 'settings') return <SettingsTab user={user} saveUser={saveUser} />;

            // INVOICE LOGIC
            const [invoice, setInvoice] = useState({ type: "Sale Invoice", invoiceDate: new Date().toISOString().split('T')[0], invoiceNumber: "INV-" + Date.now().toString().slice(-6), customerName: "", customerNTN: "", customerDestination: "Sindh", items: [], scenarioId: "" });
            const defaultLine = { desc: '', hsCode: '', qty: 1, price: '', taxRate: 18, furtherTax: 4, retailPrice: 0, extraTax: 0, saleType: "Goods at standard rate (default)", sroScheduleNo: "", sroItemSerialNo: "" };
            const [line, setLine] = useState(defaultLine);
            
            // VALIDATION LOCK
            const [isValidated, setIsValidated] = useState(false);

            // Any change to invoice resets validation lock
            useEffect(() => { setIsValidated(false); }, [invoice]);

            const isRetail = (t) => t === "3rd Schedule Goods" || t === "Cotton ginners";

            const addLine = () => {
                if(!line.desc || !line.price) return setMsg({type: 'error', text: "Fill Price and Description"});
                setInvoice({...invoice, items: [...invoice.items, { ...line, id: Date.now() }]});
                setLine({...defaultLine, furtherTax: invoice.customerNTN ? 0 : 4}); // Hard reset after add
            };

            const submit = async (isValidate = false, retryReg = null, retryScen = null) => {
                setLoading(true);
                const mode = user.settings.integrationMode;
                const token = mode === 'production' ? user.settings.productionToken : user.settings.sandboxToken;
                const reg = retryReg || (invoice.customerNTN.length >= 7 ? "Registered" : "Unregistered");

                const payload = {
                    invoiceType: invoice.type, invoiceDate: invoice.invoiceDate, sellerNTNCNIC: user.settings.ntn.replace(/-/g,''), sellerBusinessName: user.settings.businessName, sellerProvince: user.settings.province, sellerAddress: user.settings.address,
                    buyerNTNCNIC: invoice.customerNTN.replace(/-/g,''), buyerBusinessName: invoice.customerName, buyerProvince: invoice.customerDestination, buyerRegistrationType: reg,
                    items: invoice.items.map((it, idx) => {
                        const isR = isRetail(it.saleType);
                        const isRed = ["Goods at reduced rate", "Goods at zero-rate", "Exempt goods"].includes(it.saleType);
                        const q = parseFloat(it.qty), p = parseFloat(it.price), r = isR ? parseFloat(it.retailPrice) : 0;
                        const baseVal = (isR ? r : p) * q;
                        const tax = baseVal * (parseFloat(it.taxRate)/100);
                        const fur = isRed ? 0 : baseVal * (parseFloat(it.furtherTax)/100);
                        const ex = isR ? baseVal * (parseFloat(it.extraTax)/100) : 0;
                        return {
                            itemNo: idx + 1, hsCode: it.hsCode.split(' - ')[0], productDescription: it.desc, rate: `${it.taxRate}%`, quantity: q, uoM: "Numbers, pieces, units",
                            valueSalesExcludingST: +baseVal.toFixed(2), fixedNotifiedValueOrRetailPrice: +r.toFixed(2), salesTaxApplicable: +tax.toFixed(2), furtherTax: +fur.toFixed(2), extraTax: +ex.toFixed(2),
                            totalValues: +(baseVal + tax + fur + ex).toFixed(2), saleType: it.saleType, sroScheduleNo: it.sroScheduleNo || "", sroItemSerialNo: it.sroItemSerialNo || ""
                        };
                    })
                };
                if (mode !== 'production') payload.scenarioId = retryScen || invoice.scenarioId || (reg === "Registered" ? "SN001" : "SN002");

                try {
                    const endpoint = isValidate ? (mode === 'production' ? SYSTEM_CONFIG.PATHS.VALIDATE_INVOICE_PROD : SYSTEM_CONFIG.PATHS.VALIDATE_INVOICE_SB) : (mode === 'production' ? SYSTEM_CONFIG.PATHS.POST_INVOICE_PROD : SYSTEM_CONFIG.PATHS.POST_INVOICE_SB);
                    const res = await fbrFetch(SYSTEM_CONFIG.BASE_URL + endpoint, { method: 'POST', body: JSON.stringify(payload) });
                    const raw = await res.json();
                    let data = typeof raw === 'string' ? JSON.parse(raw.replace(/,\s*([}\]])/g, '$1')) : raw;

                    if (res.ok && (!data.Code || data.Code === "0000")) {
                        if (isValidate) {
                            setMsg({ type: 'success', text: "Validation Successful. You may now Submit to FBR." });
                            setIsValidated(true); // Unlocks the Submit button
                        } else {
                            setMsg({ type: 'success', text: "FBR Success! #" + data.InvoiceNumber });
                            saveUser({ history: [{ ...invoice, fbrInvoiceNumber: data.InvoiceNumber, id: Date.now() }, ...(user.history || [])] });
                            setInvoice({ ...invoice, items: [], invoiceNumber: "INV-" + Date.now().toString().slice(-6) });
                            setIsValidated(false); // Relock
                        }
                    } else {
                        const err = data.Message || JSON.stringify(data);
                        if (err.includes("scenario not valid") && !retryScen) return submit(isValidate, reg === "Registered" ? "Unregistered" : "Registered", reg === "Registered" ? "SN002" : "SN001");
                        setMsg({ type: 'error', text: "Rejected: " + err });
                        setIsValidated(false); // Lock on fail
                    }
                } catch (e) { setMsg({ type: 'error', text: "FBR Connection Error" }); setIsValidated(false); }
                setLoading(false);
            };

            return (
                <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                    <h2 className="text-xl font-bold mb-6">Standard Invoice Entry</h2>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <Input label="Date" type="date" value={invoice.invoiceDate} onChange={e => setInvoice({...invoice, invoiceDate: e.target.value})} />
                        <Input label="Invoice #" value={invoice.invoiceNumber} onChange={e => setInvoice({...invoice, invoiceNumber: e.target.value})} />
                        <SearchableDropdown label="Customer Name" value={invoice.customerName} options={(user.customers || []).map(c => c.name)} strict={false} onChange={v => {
                            const c = user.customers?.find(x => x.name === v);
                            setInvoice({...invoice, customerName: v, customerNTN: c?.ntn || "", customerDestination: c?.destination || "Sindh"});
                        }} />
                        <Input label="NTN" value={invoice.customerNTN} onChange={e => setInvoice({...invoice, customerNTN: e.target.value})} />
                    </div>

                    <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200 mb-8">
                        <div className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                            <div className="md:col-span-4"><Input label="Description" value={line.desc} onChange={e => setLine({...line, desc: e.target.value})} /></div>
                            <div className="md:col-span-2"><Input label="HS Code" value={line.hsCode} onChange={e => setLine({...line, hsCode: e.target.value})} /></div>
                            <div className="md:col-span-3">
                                <SearchableDropdown label="Sale Type" value={line.saleType} options={SALE_TYPES} onChange={v => {
                                    let r = 18, f = 4;
                                    if(v === "Goods at reduced rate") { r = 10; f = 0; }
                                    if(v.includes("zero") || v.includes("Exempt")) { r = 0; f = 0; }
                                    setLine({...line, saleType: v, taxRate: r, furtherTax: f, retailPrice: 0, extraTax: 0});
                                }} />
                            </div>
                            <div className="md:col-span-1"><Input label="Qty" type="number" value={line.qty} onChange={e => setLine({...line, qty: e.target.value})} /></div>
                            <div className="md:col-span-2"><Input label="Price" type="number" value={line.price} onChange={e => setLine({...line, price: e.target.value})} /></div>
                            <div className="md:col-span-2"><Input label="Tax %" type="number" value={line.taxRate} onChange={e => setLine({...line, taxRate: e.target.value})} /></div>
                            <div className="md:col-span-2"><Input label="Further Tax %" type="number" value={line.furtherTax} onChange={e => setLine({...line, furtherTax: e.target.value})} /></div>
                            
                            {isRetail(line.saleType) && <div className="md:col-span-2"><Input label="Retail Price" type="number" value={line.retailPrice} onChange={e => setLine({...line, retailPrice: e.target.value})} /></div>}
                            <div className="md:col-span-3"><SearchableDropdown label="SRO" value={line.sroScheduleNo} options={["THIRD SCHEDULE", "FIFTH SCHEDULE", "SIXTH SCHEDULE Table 1", "EIGHTH SCHEDULE Table 1"]} strict={false} onChange={v => setLine({...line, sroScheduleNo: v})} /></div>
                            <div className="md:col-span-1"><Input label="SNo" value={line.sroItemSerialNo} onChange={e => setLine({...line, sroItemSerialNo: e.target.value})} /></div>
                            <div className="md:col-span-2"><button className="w-full h-11 bg-black text-white rounded-xl font-bold" onClick={addLine}>Add Item</button></div>
                        </div>
                    </div>

                    <div className="mb-8 border border-gray-200 rounded-2xl overflow-hidden shadow-sm">
                        <div className="w-full overflow-x-auto hide-scrollbar">
                            <table className="fbr-table">
                                <thead><tr className="bg-gray-50 text-xs uppercase text-gray-500"><th>Item</th><th>HS Code</th><th>Type</th><th>Qty</th><th>Price</th><th>Tax %</th><th>Total</th><th className="text-center">Action</th></tr></thead>
                                <tbody>
                                    {invoice.items.length === 0 ? <tr><td colSpan="8" className="text-center py-12 text-gray-400">No items added to invoice.</td></tr> : invoice.items.map(it => (
                                        <tr key={it.id} className="text-sm">
                                            <td className="font-bold">{it.desc}</td><td>{it.hsCode}</td><td className="text-xs text-gray-500">{it.saleType}</td><td>{it.qty}</td><td>{it.price}</td><td>{it.taxRate}%</td>
                                            <td className="font-bold">{(it.qty * it.price * (1 + (parseFloat(it.taxRate)+parseFloat(it.furtherTax))/100)).toFixed(2)}</td>
                                            <td className="text-center">
                                                <div className="flex justify-center gap-3">
                                                    <button onClick={() => {setLine(it); setInvoice({...invoice, items: invoice.items.filter(x => x.id !== it.id)});}} className="text-gray-400 hover:text-black"><Icons.Edit size={16}/></button>
                                                    <button onClick={() => setInvoice({...invoice, items: invoice.items.filter(x => x.id !== it.id)})} className="text-gray-400 hover:text-red-500"><Icons.Trash2 size={16}/></button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="flex justify-end items-center gap-4 border-t border-gray-100 pt-6">
                        <button className="px-6 py-3 border border-gray-200 text-gray-700 hover:bg-gray-50 rounded-xl font-bold transition-colors" onClick={() => setLastInv({ ...invoice, id: invoice.invoiceNumber }) || setShowReceipt(true)}>Print Preview</button>
                        
                        {!isValidated && <button className="px-8 py-3 bg-gray-100 text-black border border-gray-300 rounded-xl font-bold shadow-sm hover:bg-gray-200 transition-colors flex items-center gap-2" onClick={() => submit(true)} disabled={loading || invoice.items.length === 0}><Icons.CheckCircle size={18}/> Validate Details</button>}
                        
                        {isValidated && <button className="px-10 py-3 bg-black text-white rounded-xl font-bold shadow-xl hover:bg-gray-800 transition-transform active:scale-95 animate-fade-in flex items-center gap-2" onClick={() => submit(false)} disabled={loading}><Icons.Save size={18}/> {loading ? 'Submitting...' : 'Submit to FBR'}</button>}
                    </div>
                </div>
            );
        };

        const ReceiptModal = ({ inv, user, onClose }) => {
            const qrUrl = new QRious({ value: `https://fbr.gov.pk/invoice?id=${inv.fbrInvoiceNumber}`, size: 100 }).toDataURL();
            return (
                <div className="bg-white p-8 rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto relative shadow-2xl">
                    <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 no-print hover:text-black">✕ Close</button>
                    <div id="printable-area" className="p-4 text-black bg-white">
                        <div className="flex justify-between border-b-2 border-black pb-4 mb-4">
                            <div>
                                <h1 className="text-2xl font-bold uppercase">{user.settings?.businessName}</h1>
                                <p className="text-sm">{user.settings?.address}</p>
                                {user.settings?.phone && <p className="text-sm">Phone: {user.settings.phone}</p>}
                                {user.settings?.email && <p className="text-sm">Email: {user.settings.email}</p>}
                                <p className="font-bold mt-1">NTN: {user.settings?.ntn}</p>
                            </div>
                            <div className="text-center flex flex-col items-center justify-center">
                                {/* Official FBR Logo Integration */}
                                <img src="https://app.tallied.pk/do-fbr-digital-invoice-integration-for-pakistan-market-2.png" alt="FBR Digital Invoicing" className="w-48 h-auto object-contain" id="fbr-official-logo" />
                            </div>
                        </div>
                        <div className="text-center font-bold text-lg border-b-2 border-black mb-4 py-1 tracking-widest">DIGITAL SALES INVOICE</div>
                        <div className="grid grid-cols-2 gap-8 mb-6 text-sm">
                            <div>
                                <p><strong>Buyer:</strong> {inv.customerName}</p>
                                <p><strong>NTN:</strong> {inv.customerNTN || 'Unregistered'}</p>
                            </div>
                            <div className="text-right">
                                <p><strong>Invoice #:</strong> {inv.fbrInvoiceNumber || inv.invoiceNumber}</p>
                                <p><strong>Date:</strong> {inv.invoiceDate}</p>
                            </div>
                        </div>
                        <table className="w-full text-xs border-collapse border border-black mb-6">
                            <thead className="bg-gray-100">
                                <tr><th className="border border-black p-1 text-left">Description</th><th className="border border-black p-1">Qty</th><th className="border border-black p-1 text-right">Rate</th><th className="border border-black p-1 text-center">Tax</th><th className="border border-black p-1 text-right">Amount</th></tr>
                            </thead>
                            <tbody>
                                {inv.items.map((it, i) => (
                                    <tr key={i}>
                                        <td className="border border-black p-1 font-bold">{it.desc}</td><td className="border border-black p-1 text-center">{it.qty}</td>
                                        <td className="border border-black p-1 text-right">{it.price}</td><td className="border border-black p-1 text-center">{it.taxRate}%</td>
                                        <td className="border border-black p-1 text-right">{(it.qty * it.price).toFixed(2)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        <div className="flex justify-between items-end">
                            {inv.fbrInvoiceNumber ? <img src={qrUrl} className="w-24 h-24 border border-gray-200" /> : <div className="w-24 h-24 border border-dashed border-gray-300 flex items-center justify-center text-xs text-gray-400 text-center">QR Pending<br/>Validation</div>}
                            <div className="w-1/2 text-right text-sm">
                                <p className="flex justify-between"><span>Subtotal:</span><span>{inv.items.reduce((s,i)=>s+(i.qty*i.price),0).toFixed(2)}</span></p>
                                <p className="flex justify-between border-t border-black font-bold text-lg pt-1 mt-1"><span>Total:</span><span>{inv.items.reduce((s,i)=>s+(i.qty*i.price*(1+(parseFloat(i.taxRate)+parseFloat(i.furtherTax))/100)),0).toFixed(2)}</span></p>
                            </div>
                        </div>
                    </div>
                    <button onClick={() => window.print()} className="mt-8 w-full bg-black text-white py-3 rounded-xl font-bold no-print hover:bg-gray-800 flex justify-center items-center gap-2"><Icons.Printer size={18}/> Print Official Invoice</button>
                </div>
            );
        };

        const SettingsTab = ({ user, saveUser }) => {
            const [f, setF] = useState({ phone: user.settings?.phone || '', email: user.settings?.email || '' });
            const save = () => { saveUser({ settings: { ...user.settings, ...f } }); alert("Business Contact Info Updated!"); };
            return (
                <Card className="p-8 max-w-2xl mx-auto">
                    <h2 className="font-bold text-xl mb-6">Business Contact Info</h2>
                    <p className="text-sm text-gray-500 mb-6">This information will automatically print on the top-left corner of all your official FBR invoices.</p>
                    <div className="flex flex-col gap-5 mb-8">
                        <Input label="Business Phone Number" onChange={e => setF({...f, phone: e.target.value})} value={f.phone} placeholder="e.g. +92 300 1234567" />
                        <Input label="Business Email Address" onChange={e => setF({...f, email: e.target.value})} value={f.email} placeholder="e.g. info@yourbusiness.com" />
                    </div>
                    <button className="bg-black text-white px-8 py-3 rounded-xl font-bold shadow-md hover:bg-gray-800" onClick={save}>Save Settings</button>
                </Card>
            );
        };

        const HistoryTab = ({ user, setLastInv, setShowReceipt }) => (
            <Card className="overflow-hidden">
                <div className="w-full overflow-x-auto hide-scrollbar">
                    <table className="w-full text-left min-w-[800px]">
                        <thead className="bg-black text-white text-xs uppercase"><tr><th className="p-4">FBR #</th><th className="p-4">Date</th><th className="p-4">Customer</th><th className="p-4">Action</th></tr></thead>
                        <tbody>{user.history?.map(h => <tr key={h.id} className="border-t hover:bg-gray-50">
                            <td className="p-4 font-bold text-red-600">{h.fbrInvoiceNumber}</td><td className="p-4">{h.invoiceDate}</td><td className="p-4 font-bold">{h.customerName}</td>
                            <td className="p-4"><button className="bg-gray-100 hover:bg-gray-200 px-4 py-1.5 rounded-lg text-sm font-bold transition-colors" onClick={() => { setLastInv(h); setShowReceipt(true); }}>View / Print</button></td>
                        </tr>)}</tbody>
                    </table>
                </div>
            </Card>
        );

        const InventoryTab = ({ user, saveUser }) => {
            const [f, setF] = useState({ name: '', hsCode: '', price: '', taxRate: 18, saleType: "Goods at standard rate (default)" });
            const add = () => { if(f.name) { saveUser({ inventory: [...(user.inventory || []), { ...f, id: Date.now() }] }); setF({ name: '', hsCode: '', price: '', taxRate: 18, saleType: "Goods at standard rate (default)" }); } };
            return (
                <Card className="p-8">
                    <h2 className="font-bold text-xl mb-6">Product Catalog</h2>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <Input label="Name" onChange={e => setF({...f, name: e.target.value})} value={f.name} />
                        <Input label="HS Code" onChange={e => setF({...f, hsCode: e.target.value})} value={f.hsCode} />
                        <Input label="Price" type="number" onChange={e => setF({...f, price: e.target.value})} value={f.price} />
                        <button className="bg-black text-white h-11 rounded-xl mt-5 font-bold" onClick={add}>Save Product</button>
                    </div>
                </Card>
            );
        };

        const CustomersTab = ({ user, saveUser }) => {
            const [f, setF] = useState({ name: '', ntn: '', destination: 'Sindh' });
            const add = () => { if(f.name) { saveUser({ customers: [...(user.customers || []), { ...f, id: Date.now() }] }); setF({ name: '', ntn: '', destination: 'Sindh' }); } };
            return (
                <Card className="p-8">
                    <h2 className="font-bold text-xl mb-6">Customer Directory</h2>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <Input label="Name" onChange={e => setF({...f, name: e.target.value})} value={f.name} />
                        <Input label="NTN" onChange={e => setF({...f, ntn: e.target.value})} value={f.ntn} />
                        <SearchableDropdown label="Province" options={PROVINCES} onChange={v => setF({...f, destination: v})} value={f.destination} />
                        <button className="bg-black text-white h-11 rounded-xl mt-5 font-bold" onClick={add}>Add Customer</button>
                    </div>
                </Card>
            );
        };

        const Card = ({ children, className = "" }) => <div className={`bg-white rounded-3xl shadow-sm border border-gray-100 ${className}`}>{children}</div>;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
