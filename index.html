    <style>
        @media print {
            body * {
                visibility: hidden;
            }

            #printable-area,
            #printable-area * {
                visibility: visible;
            }

            #printable-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 0;
                box-shadow: none !important;
                border-radius: 0 !important;
                overflow: visible !important;
            }

            .no-print {
                display: none !important;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #333;
        }

        /* Table Input Alignment - Clean Look (No Box) */
        .table-input {
            height: 2.5rem;
            width: 100%;
            border: none;
            border-bottom: 1px solid #e2e8f0;
            border-radius: 0;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
            font-size: 0.85rem;
            outline: none;
            background: transparent;
            transition: border-color 0.15s ease-in-out;
        }

        .table-input:focus {
            border-bottom-color: #000;
            background: #f8fafc;
        }

        .table-input:read-only {
            color: #6b7280;
            cursor: not-allowed;
            border-bottom-style: dashed;
        }
    </style>
</head>

            constructor(props) {
                super(props);

                return { hasError: true, error };
            }

        // --- Shared Components --- 
        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {

        // --- Searchable Dropdown --- 
        const SearchableDropdown = ({ label, value, onChange = () => { }, options = [], placeholder, strict = true, status = null, readOnly = false }) => {
            const [show, setShow] = useState(false);
            const [filter, setFilter] = useState("");
            const wrapperRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setShow(false);
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const safeOptions = Array.isArray(options) ? options : [];
            const safeString = (str) => (str === null || str === undefined) ? "" : String(str);
            const filteredOptions = safeOptions.filter(opt => safeString(opt).toLowerCase().includes(filter.toLowerCase()));

            return (
                <div className="flex flex-col gap-1 relative w-full" ref={wrapperRef}>
                    <div className="flex justify-between items-center">
                        {label && <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{label}</label>}
                        {status && <span className={`text-[10px] px-1 rounded ${status.type === 'error' ? 'text-red-600 bg-red-50' : 'text-gray-600 bg-gray-100'}`}>{status.text}</span>}
                    </div>
                    <div className="relative">
                        <input
                            type="text"
                            value={value || ""}
                            readOnly={strict || readOnly}
                            className={`px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-500 outline-none w-full ${strict || readOnly ? 'cursor-pointer' : ''} ${readOnly ? 'bg-gray-100 text-gray-500 cursor-not-allowed' : ''}`}
                            placeholder={placeholder}
                            onClick={() => { if (!readOnly) { setShow(!show); setFilter(""); } }}
                            onChange={!strict && !readOnly ? (e) => onChange(e.target.value) : undefined}
                        />
                        {strict && !readOnly && <div className="absolute right-2 top-2.5 text-gray-400 pointer-events-none"><Icons.Settings size={14} /></div>}
                    </div>
                    {show && !readOnly && (

                            <div className="p-2 border-b border-gray-100">

                            </div>
                        </div>
                    )}

        };


        const formatCurrency = (val) => parseFloat(val || 0).toLocaleString('en-PK', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const getToday = () => new Date().toISOString().split('T')[0];

        // --- FBR PROXY HELPER ---
        const fbrFetch = async (url, options = {}) => {
            if (!url.startsWith(SYSTEM_CONFIG.BASE_URL)) return fetch(url, options);

            const proxyPayload = {
                endpoint: url.replace(SYSTEM_CONFIG.BASE_URL, ''),
                method: options.method || 'GET',
                headers: options.headers || {}
            };

            if (options.body) {
                try { proxyPayload.payload = JSON.parse(options.body); } catch { proxyPayload.payload = options.body; }
            }

            const sessionToken = sessionStorage.getItem('fbr_token');

            if (!sessionToken && !url.includes('https://app.tallied.pk/api/login')) {
                return {
                    ok: false, status: 401, statusText: "Unauthorized",
                    json: async () => ({ error: "Missing session token" }),
                    text: async () => "Missing session token"
                };
            }

            const res = await fetch('https://app.tallied.pk/api/fbr/proxy', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': sessionToken ? `Bearer ${sessionToken}` : ''
                },
                body: JSON.stringify(proxyPayload)
            });

            if (!res.ok) return res;

            const proxyData = await res.json();
            return {
                ok: proxyData.ok,
                status: proxyData.status,
                statusText: proxyData.statusText,
                json: async () => proxyData.data,
                text: async () => typeof proxyData.data === 'string' ? proxyData.data : JSON.stringify(proxyData.data)
            };
        };

        // --- AUTH & DATA MANAGER --- 
        const DataManager = {
            getGlobalAnnouncement: () => localStorage.getItem('fbr_announcement') || "",
            setGlobalAnnouncement: (msg) => localStorage.setItem('fbr_announcement', msg)
        };

        const validatePassword = (password) => {
            const regex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$/;
            return regex.test(password);
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isAppLoading, setIsAppLoading] = useState(true);

            useEffect(() => {
                const loadSession = async () => {
                    try {
                        const session = await localforage.getItem('fbr_session');
                        if (session) {
                            setUser(session);
                        } else {
                            const oldSession = sessionStorage.getItem('fbr_session');
                            if (oldSession) {
                                const parsedUser = JSON.parse(oldSession);
                                setUser(parsedUser);
                                await localforage.setItem('fbr_session', parsedUser);
                            }
                        }
                    } catch (e) {
                        sessionStorage.removeItem('fbr_session');
                        sessionStorage.removeItem('fbr_token');
                        if (window.localforage) await window.localforage.removeItem('fbr_session');
                        setUser(null);
                    } finally {
                        setIsAppLoading(false);
                    }
                };
                loadSession();
            }, []);

            const handleLogin = async (u) => {
                setUser(u);
                try {
                    if (window.localforage) await window.localforage.setItem('fbr_session', u);
                    sessionStorage.setItem('fbr_session', JSON.stringify(u)); 
                } catch(e) { console.error("Storage error", e); }
            };

            const handleLogout = async (e, force = false) => {
                if (e && e.preventDefault) e.preventDefault();
                
                if (user && user.isImpersonated && !force) {
                    handleExitImpersonation();
                    return;
                }

                window.sessionStorage.clear();
                window.localStorage.clear();
                if (window.localforage) {
                    window.localforage.clear().catch(err => console.error("localforage clear error:", err));
                }

                window.location.href = window.location.pathname + '?logout=' + Date.now();
            };

            // NEW IMPERSONATION LOGIC (Bulletproof Transition)
            const handleImpersonate = async (userId) => {
                try {
                    const response = await fetch('https://app.tallied.pk/api/admin/impersonate', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${sessionStorage.getItem('fbr_token')}` 
                        },
                        body: JSON.stringify({ userId })
                    });
                    
                    const data = await response.json();
                    if (response.ok && data.token) {
                        // Securely back up Admin identity
                        sessionStorage.setItem('fbr_admin_backup', JSON.stringify(user));
                        if (window.localforage) await window.localforage.setItem('fbr_admin_backup', user);
                        
                        // Apply temporary client identity
                        const clientUser = { ...data.user, isImpersonated: true };
                        sessionStorage.setItem('fbr_token', data.token);
                        sessionStorage.setItem('fbr_session', JSON.stringify(clientUser));
                        if (window.localforage) await window.localforage.setItem('fbr_session', clientUser);
                        
                        // Force a clean page refresh to perfectly swap the identity slate
                        window.location.reload();
                    } else {
                        alert(data.error || "Failed to impersonate");
                    }
                } catch (err) {
                    console.error("Impersonation error:", err);
                    alert("Network error connecting to User.");
                }

                try {

                    sessionStorage.removeItem('fbr_admin_backup');
                    if (window.localforage) {
                        await window.localforage.removeItem('fbr_admin_backup').catch(e=>console.log(e));
                    }
                    
                    if (fallbackBackup) {
                        const adminUser = JSON.parse(fallbackBackup);
                        sessionStorage.setItem('fbr_session', fallbackBackup);
                        if (window.localforage) {
                            await window.localforage.setItem('fbr_session', adminUser).catch(e=>console.log(e));
                        }
                        window.location.reload();
                    } else {
                        handleLogout(null, true);
                    }
                } catch (err) {
                    console.error("Exit impersonation failed", err);
                    window.location.href = window.location.pathname + '?logout=' + Date.now();
                }

            if (!user) return <LoginScreen onLogin={handleLogin} />;

            if (user.role !== 'admin') {
                const hasSettings = !!user.settings;
                const hasStatus = !!(user.businessStatus || user.billing);
                if (!hasSettings || !hasStatus) {

                        method: 'POST', headers: { 'Content-Type': 'application/json' },

                    });
                    const data = await res.json();
                    if (res.ok) {
                        sessionStorage.setItem('fbr_token', data.token);
                        onLogin(data.user);
                    } else {
                        setError(data.error || "Invalid credentials");

                setLoading(false);

                                        <div className="md:col-span-2 flex gap-2">
                                            <Input label="SRO Schedule No" value={newItem.sroScheduleNo} onChange={e => setNewItem({ ...newItem, sroScheduleNo: e.target.value })} />
                                            <Input label="SRO Serial No" value={newItem.sroItemSerialNo} onChange={e => setNewItem({ ...newItem, sroItemSerialNo: e.target.value })} />
                                        </div>
                                        <div className="md:col-span-12 flex justify-end gap-2 mt-4">
                                            {editingInvId && <Button onClick={() => { setEditingInvId(null); setNewItem({ name: '', hsCode: '', price: '', uom: "", taxRate: user.settings.taxRates?.salesTax || 18, saleType: "Goods at standard rate (default)", extraTax: user.settings.taxRates?.extraTax || 0, furtherTax: 0, retailPrice: 0, fedPayable: 0, wht: 0, sroScheduleNo: "", sroItemSerialNo: "" }); }} variant="secondary" className="px-4">Cancel</Button>}
                                            <Button onClick={() => {
                                                if (user.role === 'restricted_user' && user.accessLevel === 'view') return alert("View-only access.");
                                                if (editingInvId) {
                                                    saveUser({ inventory: (user.inventory || []).map(i => i.id === editingInvId ? { ...i, ...newItem } : i) });
                                                    setEditingInvId(null);
                                                    setNewItem({ name: '', hsCode: '', price: '', uom: "", taxRate: user.settings.taxRates?.salesTax || 18, saleType: "Goods at standard rate (default)", extraTax: user.settings.taxRates?.extraTax || 0, furtherTax: 0, retailPrice: 0, fedPayable: 0, wht: 0, sroScheduleNo: "", sroItemSerialNo: "" });
                                                } else addInventory();
                                            }} className="px-8 flex justify-center items-center gap-2" disabled={user.role === 'restricted_user' && user.accessLevel === 'view'}>
                                                {editingInvId ? <><Icons.Save size={16} /> Save Changes</> : <><Icons.Plus size={16} /> Add Item</>}
                                            </Button>
                                        </div>
                                    </div>
                                </Card>
                                <Card className="p-0 overflow-hidden"><table className="w-full text-left text-sm"><thead className="bg-gray-100"><tr><th className="p-3">Name</th><th className="p-3 w-32">Type</th><th className="p-3 w-96">HS Code</th><th className="p-3">Price</th>{showRetailFed && <th className="p-3">Ret.Price</th>}<th className="p-3">S.Tax%</th>{showRetailFed && <th className="p-3">FED</th>}<th className="p-3 text-right"></th></tr></thead><tbody className="divide-y divide-gray-100">{filteredInventory.map(i => (<tr key={i.id} className="hover:bg-gray-50"><td className="p-3">{i.name}</td><td className="p-3 text-xs">{i.saleType}</td><td className="p-3">{i.hsCode}</td><td className="p-3">{formatCurrency(i.price)}</td>{showRetailFed && <td className="p-3">{formatCurrency(i.retailPrice)}</td>}<td className="p-3">{i.taxRate}%</td>{showRetailFed && <td className="p-3">{i.fedPayable}</td>}<td className="p-3 text-right"><div className="flex justify-end gap-2"><button onClick={() => { setNewItem(i); setEditingInvId(i.id); }} className="text-gray-600 hover:text-black"><Icons.Edit /></button><button onClick={() => deleteInventory(i.id)} className="text-red-500"><Icons.Trash2 /></button></div></td></tr>))}</tbody></table></Card>
                            </div >
                        )}

                        {
                            activeTab === 'customers' && (
                                <div className="w-full">
                                    <Card className="p-6 mb-6">
                                        <h2 className="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2"><Icons.Users /> {editingCustId ? 'Edit Customer' : 'Add Customer'}</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
                                            <div className="md:col-span-3"><Input label="Customer Name" value={newCust.name} onChange={e => setNewCust({ ...newCust, name: e.target.value })} /></div>
                                            <div className="md:col-span-2 relative">
                                                <Input label="NTN" value={newCust.ntn} onChange={e => setNewCust({ ...newCust, ntn: e.target.value })} />
                                                <button onClick={() => checkCustomerStatus(newCust.ntn)} disabled={loading} className="absolute right-0 top-0 text-[10px] bg-black text-white px-2 py-1 rounded hover:bg-gray-800 mt-1 mr-1">Verify</button>
                                            </div>
                                            <div className="md:col-span-2">
                                                <SearchableDropdown label="Reg Type" value={newCust.regType || 'Unregistered'} options={['Unregistered', 'Registered']} onChange={val => setNewCust({ ...newCust, regType: val })} strict={true} />
                                            </div>
                                            <div className="md:col-span-2"><SearchableDropdown label="Destination" value={newCust.destination} options={dynamicProvinces} onChange={val => setNewCust({ ...newCust, destination: val })} /></div>
                                            <div className="md:col-span-2"><Input label="Address" value={newCust.address} onChange={e => setNewCust({ ...newCust, address: e.target.value })} /></div>
                                            <div className="md:col-span-1"><Button onClick={addCustomer}>{editingCustId ? 'Update' : 'Add'}</Button></div>
                                        </div>
                                    </Card>
                                    <Card className="p-0 overflow-hidden">
                                        <div className="flex justify-between items-center p-4 bg-gray-100 border-b border-gray-200">
                                            <div className="font-bold text-gray-900">Customer List</div>
                                            <div className="relative w-64"><input type="text" placeholder="Search customer..." className="px-3 py-2 border border-gray-300 rounded-lg outline-none w-full pl-8 text-sm" value={custSearch} onChange={e => setCustSearch(e.target.value)} /><span className="absolute left-2 top-2.5 text-gray-400"><Icons.Search size={14} /></span></div>
                                        </div>
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-gray-50 text-gray-500">
                                                <tr><th className="p-3">Name</th><th className="p-3">NTN</th><th className="p-3">Reg Type</th><th className="p-3">Destination</th><th className="p-3">Address</th><th className="p-3 text-right">Action</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {filteredCustomers.map(c => (
                                                    <tr key={c.id} className="hover:bg-gray-50">
                                                        <td className="p-3 font-bold">{c.name}</td>
                                                        <td className="p-3">{c.ntn}</td>
                                                        <td className="p-3 text-xs"><span className={`px-2 py-1 rounded ${c.regType === 'Registered' ? 'bg-black text-white' : 'bg-gray-200 text-gray-800'}`}>{c.regType || 'Unregistered'}</span></td>
                                                        <td className="p-3">{c.destination}</td>
                                                        <td className="p-3 text-gray-500">{c.address}</td>
                                                        <td className="p-3 text-right">
                                                            <div className="flex justify-end gap-2">
                                                                <button onClick={() => editCustomer(c)} className="text-gray-600 hover:text-black"><Icons.Edit /></button>
                                                                <button onClick={() => deleteCustomer(c.id)} className="text-red-500"><Icons.Trash2 /></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {filteredCustomers.length === 0 && (
                                                    <tr><td colSpan="6" className="p-4 text-center text-gray-400 text-sm">No customers found</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </Card>
                                </div>
                            )
                        }

                        {
                            activeTab === 'history' && (

                                <Card className="p-0 overflow-hidden w-full">
                                    <div className="flex justify-between items-center p-4 bg-gray-100 border-b border-gray-200">
                                        <div className="font-bold text-gray-900">Recent Invoices</div>
                                        <div className="relative w-64"><input type="text" placeholder="Search invoices..." className="px-3 py-2 border border-gray-300 rounded-lg outline-none w-full pl-8 text-sm" value={histSearch} onChange={e => setHistSearch(e.target.value)} /><span className="absolute left-2 top-2.5 text-gray-400"><Icons.Search size={14} /></span></div>
                                    </div>
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-gray-50 text-gray-500"><tr><th className="p-3">FBR Invoice #</th><th className="p-3">Date</th><th className="p-3">Customer</th><th className="p-3">NTN</th><th className="p-3 text-right">Total</th><th className="p-3 text-center">Action</th></tr></thead>
                                        <tbody className="divide-y divide-gray-100">{filteredHistory.map(inv => (<tr key={inv.id} className="hover:bg-gray-50"><td className="p-3 text-xs font-bold">{inv.fbrInvoiceNumber}</td><td className="p-3">{inv.invoiceDate || inv.date}</td><td className="p-3">{inv.customerName}</td><td className="p-3">{inv.customerNTN}</td><td className="p-3 text-right">{formatCurrency(inv.total)}</td><td className="p-3 text-center"><div className="flex justify-center gap-2"><button onClick={() => { setLastInv(inv); setShowReceipt(true); }} className="text-gray-600 hover:text-black" title="Print Receipt"><Icons.Printer /></button><button onClick={() => downloadInvoice(inv)} className="text-gray-600 hover:text-black" title="Download JSON"><Icons.Download /></button></div></td></tr>))}</tbody>
                                    </table>
                                </Card>
                            )
                        }

                        {
                            activeTab === 'settings' && (
                                <div className="w-full"><Card className="p-8"><h2 className="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2"><Icons.Settings /> Client Configuration</h2>
                                    <div className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 opacity-80 pointer-events-none"><Input label="Business Name" value={user?.settings?.businessName} readOnly /><Input label="Business Address" value={user?.settings?.address} readOnly /></div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 opacity-80 pointer-events-none"><Input label="NTN" value={user?.settings?.ntn} readOnly /><Input label="STRN" value={user?.settings?.strn} readOnly /></div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 opacity-80 pointer-events-none"><Input label="Sale Origination Province" value={user?.settings?.province} readOnly /><Input label="Whitelisted IP" value={user?.settings?.whitelistedIp} readOnly /></div>
                                        <div className="opacity-80 pointer-events-none"><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide block mb-1">Company Logo</label>{user.settings.logo ? <img src={user.settings.logo} className="h-10 mt-2" /> : <p className="text-sm">No Logo Uploaded</p>}</div>
                                        <div className="opacity-80 pointer-events-none"><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide block mb-1">Active Environment</label><span className={`flex items-center gap-1 px-2 py-1 rounded text-xs w-24 ${user.settings.integrationMode === 'production' ? 'bg-gray-200 text-gray-800' : 'bg-yellow-100 text-yellow-800'}`}>{user.settings.integrationMode === 'production' ? 'Production' : 'Sandbox'}</span></div>
                                        <div className="opacity-80 pointer-events-none"><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide block mb-1">Access Valid Till</label><span className="text-sm">{new Date(user.billing.expiry).toDateString()}</span></div>
                                    </div>
                                    <div className="text-center mt-6 text-sm text-gray-500">Contact Administrator to update basic details. Invoices are permanently locked to the strict FBR Standard format.</div>
                                </Card></div>
                            )
                        }
                    </main >

                    {showReceipt && lastInv && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                            {renderInvoiceTemplate()}
                        </div>
                    )}
                </div >
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>

</html>
